  <text x="72" y="92" class="title">Aquila Blog System Architecture</text>
  <text x="72" y="128" class="subtitle">Public web runs on Vercel. Stateful services run on a home server behind Cloudflare Tunnel and Caddy.</text>

  <text x="72" y="188" class="section">PUBLIC WEB</text>
  <text x="712" y="188" class="section">HOME SERVER</text>

