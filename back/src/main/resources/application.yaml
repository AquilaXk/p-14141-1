server:
  port: 8080
  shutdown: graceful
  forward-headers-strategy: native
spring:
  application:
    name: back
  profiles:
    active: dev
  config:
    import: optional:file:.env[.properties]
  output:
    ansi:
      enabled: always
  threads:
    virtual:
      enabled: true
  web:
    resources:
      add-mappings: false
  jackson:
    serialization:
      fail-on-empty-beans: false
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${SPRING__SECURITY__OAUTH2__CLIENT__REGISTRATION__KAKAO__CLIENT_ID:}
            scope: profile_nickname, profile_image
            client-name: Kakao
            authorization-grant-type: authorization_code
            redirect-uri: '${custom.site.backUrl}/login/oauth2/code/{registrationId}'
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  mail:
    host: ${SPRING__MAIL__HOST:}
    port: ${SPRING__MAIL__PORT:587}
    username: ${SPRING__MAIL__USERNAME:}
    password: ${SPRING__MAIL__PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING__MAIL__PROPERTIES__MAIL__SMTP__AUTH:true}
          starttls:
            enable: ${SPRING__MAIL__PROPERTIES__MAIL__SMTP__STARTTLS__ENABLE:true}
  data:
    redis:
      host: ${custom.site.redisHost}
      port: ${custom.site.redisPort}
      password: ${SPRING__DATA__REDIS__PASSWORD:}
      database: ${custom.site.redisDatabase}
  datasource:
    url: jdbc:postgresql://${custom.site.dbHost}:${custom.site.dbPort}/${custom.site.dbName}?reWriteBatchedInserts=true
    username: postgres
    password: ${SPRING__DATASOURCE__PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: false
  servlet:
    multipart:
      max-file-size: ${CUSTOM_STORAGE_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${CUSTOM_STORAGE_MULTIPART_MAX_REQUEST_SIZE:10MB}
  sql:
    init:
      mode: always
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: com.back.global.jpa.config.CustomPostgreSQLDialect
        default_batch_fetch_size: 128
        jdbc:
          batch_size: 128
          order_inserts: true
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
    show-sql: true
logging:
  level:
    com.back: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.orm.jdbc.extract: TRACE
    org.hibernate.orm.jdbc.batch: TRACE
    org.springframework.transaction.interceptor: TRACE
management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: ping,db
custom:
  dbBaseName: blog
  dev:
    cookieDomain: localhost
    frontUrl: "http://${custom.dev.cookieDomain}:3000"
    backUrl: "http://${custom.dev.cookieDomain}:${server.port}"
    dbHost: localhost
    dbPort: 5432
    dbName: "${custom.dbBaseName}_dev"
    redisHost: localhost
    redisPort: 6379
    redisDatabase: 0
  test:
    cookieDomain: localhost
    frontUrl: "http://${custom.test.cookieDomain}:3000"
    backUrl: "http://${custom.test.cookieDomain}:${server.port}"
    dbHost: localhost
    dbPort: ${CUSTOM__TEST__DB_PORT:15432}
    dbName: "${custom.dbBaseName}_test"
    redisHost: localhost
    redisPort: ${CUSTOM__TEST__REDIS_PORT:16379}
    redisDatabase: 1
  prod:
    cookieDomain: blog.oa.gg
    frontUrl: "https://www.${custom.prod.cookieDomain}"
    backUrl: "https://api.${custom.prod.cookieDomain}"
    dbHost: pg_1
    dbPort: 5432
    dbName: "${custom.dbBaseName}_prod"
    redisHost: redis_1
    redisPort: 6379
    redisDatabase: 0
  site:
    cookieDomain: "${custom.dev.cookieDomain}"
    frontUrl: "${custom.dev.frontUrl}"
    backUrl: "${custom.dev.backUrl}"
    dbHost: "${custom.dev.dbHost}"
    dbPort: "${custom.dev.dbPort}"
    dbName: "${custom.dev.dbName}"
    redisHost: "${custom.dev.redisHost}"
    redisPort: "${custom.dev.redisPort}"
    redisDatabase: "${custom.dev.redisDatabase}"
  member:
    signup:
      verifyPath: ${CUSTOM__MEMBER__SIGNUP__VERIFY_PATH:/signup/verify}
      emailExpirationSeconds: ${CUSTOM__MEMBER__SIGNUP__EMAIL_EXPIRATION_SECONDS:86400}
      sessionExpirationSeconds: ${CUSTOM__MEMBER__SIGNUP__SESSION_EXPIRATION_SECONDS:3600}
      mailFrom: ${CUSTOM__MEMBER__SIGNUP__MAIL_FROM:}
      mailSubject: ${CUSTOM__MEMBER__SIGNUP__MAIL_SUBJECT:[AquilaXk] 회원가입 이메일 인증}
  admin:
    username: "${CUSTOM__ADMIN__USERNAME:}"
    password: "${CUSTOM__ADMIN__PASSWORD:}"
  auth:
    login:
      maxAttempts: ${CUSTOM__AUTH__LOGIN__MAX_ATTEMPTS:5}
      windowSeconds: ${CUSTOM__AUTH__LOGIN__WINDOW_SECONDS:300}
      lockSeconds: ${CUSTOM__AUTH__LOGIN__LOCK_SECONDS:600}
  jwt:
    secretKey: "${CUSTOM__JWT__SECRET_KEY:}"
  accessToken:
    expirationSeconds: 1200
  task:
    processor:
      fixedDelayMs: ${CUSTOM__TASK__PROCESSOR__FIXED_DELAY_MS:60000}
      batchSize: ${CUSTOM__TASK__PROCESSOR__BATCH_SIZE:50}
      processingTimeoutSeconds: ${CUSTOM__TASK__PROCESSOR__PROCESSING_TIMEOUT_SECONDS:900}
  cache:
    ttl-seconds: 3600
    ttl-overrides: { }
  revalidate:
    url: "${CUSTOM__REVALIDATE__URL:}"
    token: "${CUSTOM__REVALIDATE__TOKEN:}"
  storage:
    enabled: ${CUSTOM_STORAGE_ENABLED:false}
    endpoint: ${CUSTOM_STORAGE_ENDPOINT:http://localhost:9000}
    region: ${CUSTOM_STORAGE_REGION:us-east-1}
    bucket: ${CUSTOM_STORAGE_BUCKET:blog-images}
    accessKey: ${CUSTOM_STORAGE_ACCESSKEY:}
    secretKey: ${CUSTOM_STORAGE_SECRETKEY:}
    pathStyleAccess: ${CUSTOM_STORAGE_PATHSTYLEACCESS:true}
    keyPrefix: ${CUSTOM_STORAGE_KEYPREFIX:posts}
    maxFileSizeBytes: ${CUSTOM_STORAGE_MAXFILESIZEBYTES:10485760}
    retention:
      tempUploadSeconds: ${CUSTOM__STORAGE__RETENTION__TEMP_UPLOAD_SECONDS:86400}
      replacedProfileImageSeconds: ${CUSTOM__STORAGE__RETENTION__REPLACED_PROFILE_IMAGE_SECONDS:259200}
      deletedPostAttachmentSeconds: ${CUSTOM__STORAGE__RETENTION__DELETED_POST_ATTACHMENT_SECONDS:1209600}
      cleanupFixedDelayMs: ${CUSTOM__STORAGE__RETENTION__CLEANUP_FIXED_DELAY_MS:3600000}
      cleanupBatchSize: ${CUSTOM__STORAGE__RETENTION__CLEANUP_BATCH_SIZE:100}
      cleanupSafetyThreshold: ${CUSTOM__STORAGE__RETENTION__CLEANUP_SAFETY_THRESHOLD:25}
  post:
    likes:
      reconciliation:
        fixedDelayMs: ${CUSTOM__POST__LIKES__RECONCILIATION__FIXED_DELAY_MS:900000}
        lookbackHours: ${CUSTOM__POST__LIKES__RECONCILIATION__LOOKBACK_HOURS:24}
        batchSize: ${CUSTOM__POST__LIKES__RECONCILIATION__BATCH_SIZE:100}
