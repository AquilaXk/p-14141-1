name: Deploy to Home Server

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: homeserver-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  calculateTag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_latest_ref: ${{ steps.meta.outputs.image_latest_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      deploy_sha: ${{ steps.meta.outputs.deploy_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Calculate image/release tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_NAME="$(basename "${GITHUB_REPOSITORY}")"
          DEPLOY_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${DEPLOY_SHA::7}"

          IMAGE_NAME="ghcr.io/${OWNER_LC}/${REPO_NAME}-back"
          IMAGE_TAG="sha-${SHORT_SHA}"
          IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"
          IMAGE_LATEST_REF="${IMAGE_NAME}:latest"
          RELEASE_TAG="deploy-${GITHUB_RUN_ID}-${SHORT_SHA}"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "image_latest_ref=${IMAGE_LATEST_REF}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=${DEPLOY_SHA}" >> "$GITHUB_OUTPUT"

  buildAndPush:
    runs-on: ubuntu-latest
    needs: calculateTag
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.calculateTag.outputs.deploy_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./back
          file: ./back/Dockerfile
          push: true
          tags: |
            ${{ needs.calculateTag.outputs.image_ref }}
            ${{ needs.calculateTag.outputs.image_latest_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  blueGreenDeploy:
    runs-on: ubuntu-latest
    needs:
      - calculateTag
      - buildAndPush
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.calculateTag.outputs.deploy_sha }}

      - name: Verify required secrets
        shell: bash
        run: |
          required=(
            "TS_AUTHKEY=${{ secrets.TS_AUTHKEY }}"
            "HOME_SSH_USER=${{ secrets.HOME_SSH_USER }}"
            "HOME_APP_DIR=${{ secrets.HOME_APP_DIR }}"
            "HOME_HOST=${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}"
            "HOME_SSH_KEY=${{ secrets.HOME_SSH_KEY || secrets.HOME_SSH_PRIVATE_KEY }}"
            "HOME_SERVER_ENV=${{ secrets.HOME_SERVER_ENV }}"
          )

          for item in "${required[@]}"; do
            key="${item%%=*}"
            value="${item#*=}"
            if [ -z "$value" ]; then
              echo "$key missing"
              exit 1
            fi
            echo "$key present"
          done

      - name: Connect to Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Diagnose Tailscale Route to Home SSH
        env:
          HOME_HOST: ${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}
          HOME_SSH_PORT: ${{ secrets.HOME_SSH_PORT || '22' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${HOME_HOST}" ]; then
            echo "HOME host secret is empty. Set HOME_TAILSCALE_HOST (or HOME_TS_HOST/HOME_SSH_HOST/HOME_HOST)." >&2
            exit 1
          fi

          echo "diagnose target: ${HOME_HOST}:${HOME_SSH_PORT}"
          tailscale status

          echo "tailscale ping test"
          if ! tailscale ping -c 3 "${HOME_HOST}"; then
            echo "tailscale ping did not establish direct path (DERP-only or transient). Continue and rely on TCP SSH connectivity test."
          fi

          echo "tcp connectivity test"
          if command -v nc >/dev/null 2>&1; then
            timeout 10 nc -zv "${HOME_HOST}" "${HOME_SSH_PORT}"
          else
            timeout 10 bash -lc "cat < /dev/null > /dev/tcp/${HOME_HOST}/${HOME_SSH_PORT}"
            echo "tcp open: ${HOME_HOST}:${HOME_SSH_PORT}"
          fi

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          SSH_DIR="${RUNNER_TEMP}/ssh"
          rm -rf "$SSH_DIR"
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"

          printf '%s\n' "${{ secrets.HOME_SSH_KEY || secrets.HOME_SSH_PRIVATE_KEY }}" > "$SSH_DIR/home_key"
          chmod 600 "$SSH_DIR/home_key"
          if [ -n "${{ secrets.HOME_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.HOME_KNOWN_HOSTS }}" > "$SSH_DIR/known_hosts"
          else
            SSH_HOST="${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}"
            SSH_PORT="${{ secrets.HOME_SSH_PORT || '22' }}"

            if [ -z "${SSH_HOST}" ]; then
              echo "HOME host secret is empty. Set HOME_TAILSCALE_HOST (or HOME_TS_HOST/HOME_SSH_HOST/HOME_HOST)." >&2
              exit 1
            fi

            echo "Collecting known_hosts for ${SSH_HOST}:${SSH_PORT}"
            success=0
            for attempt in 1 2 3 4 5; do
              if timeout 10 ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" > "$SSH_DIR/known_hosts.tmp" 2>/dev/null; then
                if [ -s "$SSH_DIR/known_hosts.tmp" ]; then
                  mv "$SSH_DIR/known_hosts.tmp" "$SSH_DIR/known_hosts"
                  success=1
                  break
                fi
              fi
              echo "ssh-keyscan failed (attempt ${attempt}/5) for ${SSH_HOST}:${SSH_PORT}" >&2
              sleep 3
            done

            if [ "${success}" -ne 1 ]; then
              echo "Failed to build known_hosts. Set HOME_KNOWN_HOSTS explicitly or fix ssh-keyscan connectivity." >&2
              exit 1
            fi
          fi
          chmod 600 "$SSH_DIR/known_hosts"
          echo "SSH_DIR=$SSH_DIR" >> "$GITHUB_ENV"

      - name: Deploy over SSH (pull image + blue/green switch)
        env:
          HOME_HOST: ${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}
          HOME_SSH_USER: ${{ secrets.HOME_SSH_USER }}
          HOME_SSH_PORT: ${{ secrets.HOME_SSH_PORT }}
          HOME_APP_DIR: ${{ secrets.HOME_APP_DIR }}
          HOME_SERVER_ENV: ${{ secrets.HOME_SERVER_ENV }}
          HOME_BACK_IMAGE: ${{ needs.calculateTag.outputs.image_ref }}
          HOME_GHCR_USERNAME: ${{ secrets.HOME_GHCR_USERNAME }}
          HOME_GHCR_TOKEN: ${{ secrets.HOME_GHCR_TOKEN }}
          HOME_AI_SUMMARY_ENABLED: ${{ secrets.CUSTOM__AI__SUMMARY__ENABLED || vars.CUSTOM__AI__SUMMARY__ENABLED || '' }}
          HOME_AI_SUMMARY_GEMINI_API_KEY: ${{ secrets.CUSTOM__AI__SUMMARY__GEMINI__API_KEY || vars.CUSTOM__AI__SUMMARY__GEMINI__API_KEY || '' }}
          HOME_AI_SUMMARY_GEMINI_MODEL: ${{ secrets.CUSTOM__AI__SUMMARY__GEMINI__MODEL || vars.CUSTOM__AI__SUMMARY__GEMINI__MODEL || '' }}
        run: |
          PORT="${HOME_SSH_PORT:-22}"
          HOME_APP_DIR_B64="$(printf '%s' "${HOME_APP_DIR}" | base64 | tr -d '\n')"
          HOME_SERVER_ENV_B64="$(printf '%s' "${HOME_SERVER_ENV}" | base64 | tr -d '\n')"
          HOME_BACK_IMAGE_B64="$(printf '%s' "${HOME_BACK_IMAGE:-}" | base64 | tr -d '\n')"
          HOME_GHCR_USERNAME_B64="$(printf '%s' "${HOME_GHCR_USERNAME:-}" | base64 | tr -d '\n')"
          HOME_GHCR_TOKEN_B64="$(printf '%s' "${HOME_GHCR_TOKEN:-}" | base64 | tr -d '\n')"
          HOME_AI_SUMMARY_ENABLED_B64="$(printf '%s' "${HOME_AI_SUMMARY_ENABLED:-}" | base64 | tr -d '\n')"
          HOME_AI_SUMMARY_GEMINI_API_KEY_B64="$(printf '%s' "${HOME_AI_SUMMARY_GEMINI_API_KEY:-}" | base64 | tr -d '\n')"
          HOME_AI_SUMMARY_GEMINI_MODEL_B64="$(printf '%s' "${HOME_AI_SUMMARY_GEMINI_MODEL:-}" | base64 | tr -d '\n')"

          ssh -i "$SSH_DIR/home_key" -o UserKnownHostsFile="$SSH_DIR/known_hosts" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 -p "$PORT" "$HOME_SSH_USER@$HOME_HOST" \
            "HOME_APP_DIR_B64='${HOME_APP_DIR_B64}' HOME_SERVER_ENV_B64='${HOME_SERVER_ENV_B64}' HOME_BACK_IMAGE_B64='${HOME_BACK_IMAGE_B64}' HOME_GHCR_USERNAME_B64='${HOME_GHCR_USERNAME_B64}' HOME_GHCR_TOKEN_B64='${HOME_GHCR_TOKEN_B64}' HOME_AI_SUMMARY_ENABLED_B64='${HOME_AI_SUMMARY_ENABLED_B64}' HOME_AI_SUMMARY_GEMINI_API_KEY_B64='${HOME_AI_SUMMARY_GEMINI_API_KEY_B64}' HOME_AI_SUMMARY_GEMINI_MODEL_B64='${HOME_AI_SUMMARY_GEMINI_MODEL_B64}' bash -s" <<'REMOTE'
          set -euo pipefail

          decode_b64() {
            if printf '' | base64 --decode >/dev/null 2>&1; then
              printf '%s' "$1" | base64 --decode
            else
              printf '%s' "$1" | base64 -d
            fi
          }

          HOME_APP_DIR="$(decode_b64 "${HOME_APP_DIR_B64:-}")"
          HOME_SERVER_ENV="$(decode_b64 "${HOME_SERVER_ENV_B64:-}")"
          HOME_BACK_IMAGE="$(decode_b64 "${HOME_BACK_IMAGE_B64:-}")"
          HOME_GHCR_USERNAME="$(decode_b64 "${HOME_GHCR_USERNAME_B64:-}")"
          HOME_GHCR_TOKEN="$(decode_b64 "${HOME_GHCR_TOKEN_B64:-}")"
          HOME_AI_SUMMARY_ENABLED="$(decode_b64 "${HOME_AI_SUMMARY_ENABLED_B64:-}")"
          HOME_AI_SUMMARY_GEMINI_API_KEY="$(decode_b64 "${HOME_AI_SUMMARY_GEMINI_API_KEY_B64:-}")"
          HOME_AI_SUMMARY_GEMINI_MODEL="$(decode_b64 "${HOME_AI_SUMMARY_GEMINI_MODEL_B64:-}")"

          upsert_env_key() {
            local key="$1"
            local value="$2"
            local file="$3"
            [ -z "${value}" ] && return 0

            if grep -qE "^${key}=" "${file}"; then
              grep -vE "^${key}=" "${file}" > "${file}.tmp"
              printf '%s=%s\n' "${key}" "${value}" >> "${file}.tmp"
              mv "${file}.tmp" "${file}"
            else
              printf '%s=%s\n' "${key}" "${value}" >> "${file}"
            fi
          }

          cd "${HOME_APP_DIR}"

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          mkdir -p deploy/homeserver

          if [ -n "${HOME_SERVER_ENV:-}" ]; then
            printf '%s\n' "${HOME_SERVER_ENV}" > deploy/homeserver/.env.prod
          elif [ ! -f deploy/homeserver/.env.prod ]; then
            cp deploy/homeserver/.env.prod.example deploy/homeserver/.env.prod
            echo "deploy/homeserver/.env.prod created from example. Fill required values." >&2
            exit 1
          fi

          upsert_env_key "CUSTOM__AI__SUMMARY__ENABLED" "${HOME_AI_SUMMARY_ENABLED:-}" "deploy/homeserver/.env.prod"
          upsert_env_key "CUSTOM__AI__SUMMARY__GEMINI__API_KEY" "${HOME_AI_SUMMARY_GEMINI_API_KEY:-}" "deploy/homeserver/.env.prod"
          upsert_env_key "CUSTOM__AI__SUMMARY__GEMINI__MODEL" "${HOME_AI_SUMMARY_GEMINI_MODEL:-}" "deploy/homeserver/.env.prod"

          extract_env_value() {
            local key="$1"
            awk -F= -v k="$key" '
              $1==k {
                value=substr($0, index($0, "=")+1)
                gsub(/\r/, "", value)
                gsub(/^"/, "", value)
                gsub(/"$/, "", value)
                gsub(/^'\''/, "", value)
                gsub(/'\''$/, "", value)
                print value
              }
            ' deploy/homeserver/.env.prod | tail -n 1
          }

          DB_BASE_NAME_VALUE="$(extract_env_value "DB_BASE_NAME")"
          CUSTOM_PROD_DBNAME_VALUE="$(extract_env_value "CUSTOM_PROD_DBNAME")"
          TARGET_DB_NAME="${CUSTOM_PROD_DBNAME_VALUE:-}"
          if [ -z "${TARGET_DB_NAME}" ]; then
            if [ -n "${DB_BASE_NAME_VALUE}" ]; then
              TARGET_DB_NAME="${DB_BASE_NAME_VALUE}_prod"
            else
              TARGET_DB_NAME="blog_prod"
            fi
          fi

          pgroonga_precheck_fail() {
            local code="$1"
            local detail="$2"
            echo "::error title=PGroonga precheck failed::[PGROONGA_PRECHECK_FAILED] code=${code} db=${TARGET_DB_NAME} detail=${detail}"
            echo "[PGROONGA_PRECHECK_FAILED] code=${code} db=${TARGET_DB_NAME} detail=${detail}" >&2
            exit 1
          }

          echo "pgroonga precheck target db=${TARGET_DB_NAME}"
          docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml up -d db_1 >/dev/null

          echo "pgroonga install attempt"
          if ! docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml exec -T db_1 sh -lc "psql -U postgres -d '${TARGET_DB_NAME}' -v ON_ERROR_STOP=1 -c \"CREATE EXTENSION IF NOT EXISTS pgroonga;\""; then
            pgroonga_precheck_fail "install_failed" "create_extension_failed"
          fi

          PGROONGA_EXT_OK="$(docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml exec -T db_1 sh -lc "psql -U postgres -d '${TARGET_DB_NAME}' -tAc \"SELECT EXISTS (SELECT 1 FROM pg_extension WHERE extname='pgroonga');\"" 2>/dev/null | tr -d '\r' | xargs || true)"
          if [ "${PGROONGA_EXT_OK}" != "t" ]; then
            pgroonga_precheck_fail "extension_missing" "pg_extension_not_found"
          fi

          PGROONGA_OP_OK="$(docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml exec -T db_1 sh -lc "psql -U postgres -d '${TARGET_DB_NAME}' -tAc \"SELECT (ARRAY['ping'::text, 'pong'::text] &@~ 'ping');\"" 2>/dev/null | tr -d '\r' | xargs || true)"
          if [ "${PGROONGA_OP_OK}" != "t" ]; then
            pgroonga_precheck_fail "operator_failed" "andatilde_operator_check_failed"
          fi

          echo "pgroonga precheck passed"

          enabled_value="$(awk -F= '$1=="CUSTOM__AI__SUMMARY__ENABLED"{print tolower($2)}' deploy/homeserver/.env.prod | tail -n 1 | tr -d '"' | tr -d '[:space:]')"
          api_key_value="$(awk -F= '$1=="CUSTOM__AI__SUMMARY__GEMINI__API_KEY"{print substr($0, index($0, "=")+1)}' deploy/homeserver/.env.prod | tail -n 1)"
          if [ "${enabled_value}" = "true" ] && [ -z "${api_key_value}" ]; then
            echo "CUSTOM__AI__SUMMARY__ENABLED=true but CUSTOM__AI__SUMMARY__GEMINI__API_KEY is empty." >&2
            exit 1
          fi

          if [ -n "${HOME_BACK_IMAGE:-}" ]; then
            export BACK_IMAGE="${HOME_BACK_IMAGE}"
          fi

          echo "Deploying image: ${BACK_IMAGE:-unset}"

          if [ -n "${HOME_GHCR_USERNAME:-}" ] && [ -n "${HOME_GHCR_TOKEN:-}" ]; then
            echo "${HOME_GHCR_TOKEN}" | docker login ghcr.io -u "${HOME_GHCR_USERNAME}" --password-stdin
          fi

          chmod +x deploy/homeserver/create_deploy_backup.sh deploy/homeserver/rollback_last_deploy.sh

          BACKUP_DIR="$(./deploy/homeserver/create_deploy_backup.sh)"
          echo "backup created: ${BACKUP_DIR}"

          if ! HEALTHCHECK_PATH=/actuator/health/readiness HEALTHCHECK_LOG_EVERY_N_TRIES=1 ./deploy/homeserver/blue_green_deploy.sh; then
            echo "deploy failed, rollback from backup: ${BACKUP_DIR}" >&2
            ./deploy/homeserver/rollback_last_deploy.sh "${BACKUP_DIR}" || true
            exit 1
          fi

          API_DOMAIN="$(awk -F= '$1=="API_DOMAIN"{print substr($0, index($0, "=")+1)}' deploy/homeserver/.env.prod)"
          if [ -z "${API_DOMAIN}" ]; then
            echo "API_DOMAIN missing in deploy/homeserver/.env.prod" >&2
            exit 1
          fi

          ACTIVE_BACKEND="$(cat deploy/homeserver/.active_backend 2>/dev/null || true)"
          if [ "${ACTIVE_BACKEND}" != "back_blue" ] && [ "${ACTIVE_BACKEND}" != "back_green" ]; then
            echo "invalid or missing .active_backend value: '${ACTIVE_BACKEND}'" >&2
            exit 1
          fi

          if ! docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml ps --status running --services | grep -qx "${ACTIVE_BACKEND}"; then
            echo "active backend is not running: ${ACTIVE_BACKEND}" >&2
            exit 1
          fi

          TARGET_IP="$(docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml exec -T caddy sh -lc "getent hosts ${ACTIVE_BACKEND} | awk 'NR==1{print \$1}'" | tr -d '\r' | head -n 1)"
          ACTIVE_IP="$(docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml exec -T caddy sh -lc "getent hosts back_active | awk 'NR==1{print \$1}'" | tr -d '\r' | head -n 1)"

          echo "post-deploy alias verify: active_backend=${ACTIVE_BACKEND}, target_ip=${TARGET_IP:-none}, back_active_ip=${ACTIVE_IP:-none}"
          if [ -z "${TARGET_IP}" ] || [ -z "${ACTIVE_IP}" ] || [ "${TARGET_IP}" != "${ACTIVE_IP}" ]; then
            echo "back_active alias mismatch after deploy" >&2
            exit 1
          fi

          HTTP_CODE="$(docker run --rm --network blog_home_default curlimages/curl:8.7.1 -s -o /dev/null -w "%{http_code}" "http://caddy:80/actuator/health/readiness" -H "Host: ${API_DOMAIN}" || true)"
          echo "post-deploy caddy health status=${HTTP_CODE}"
          if ! echo "${HTTP_CODE}" | grep -Eq '^200$'; then
            echo "post-deploy healthcheck failed via caddy route" >&2
            exit 1
          fi
          REMOTE

  frontLiveE2E:
    runs-on: ubuntu-latest
    needs:
      - calculateTag
      - blueGreenDeploy
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      PLAYWRIGHT_BASE_URL_OVERRIDE: ${{ secrets.CUSTOM_PROD_FRONTURL || vars.CUSTOM_PROD_FRONTURL || secrets.HOME_FRONT_BASE_URL || vars.HOME_FRONT_BASE_URL || '' }}
      PLAYWRIGHT_USE_WEBSERVER: "false"
      HOME_SERVER_ENV: ${{ secrets.HOME_SERVER_ENV }}
      E2E_LIVE_ADMIN_USERNAME: ${{ secrets.E2E_LIVE_ADMIN_USERNAME || '' }}
      E2E_LIVE_ADMIN_PASSWORD: ${{ secrets.E2E_LIVE_ADMIN_PASSWORD || '' }}
      E2E_ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME || '' }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.calculateTag.outputs.deploy_sha }}

      - name: Resolve live e2e base URL
        shell: bash
        run: |
          set -euo pipefail

          extract_from_home_server_env() {
            local key="$1"
            printf '%s\n' "${HOME_SERVER_ENV:-}" | tr -d '\r' | awk -v key="$key" '
              /^[[:space:]]*#/ { next }
              /^[[:space:]]*$/ { next }
              {
                line = $0
                sub(/^[[:space:]]+/, "", line)
                sub(/^[Ee][Xx][Pp][Oo][Rr][Tt][[:space:]]+/, "", line)
                if (index(line, key "=") == 1) {
                  value = substr(line, length(key) + 2)
                  sub(/^[[:space:]]+/, "", value)
                  sub(/[[:space:]]+$/, "", value)
                  if ((value ~ /^".*"$/) || (value ~ /^'\''.*'\''$/)) {
                    value = substr(value, 2, length(value) - 2)
                  }
                  print value
                  exit
                }
              }
            '
          }

          extract_admin_from_home_server_env() {
            local key="$1"
            printf '%s\n' "${HOME_SERVER_ENV:-}" | tr -d '\r' | awk -v key="$key" '
              /^[[:space:]]*#/ { next }
              /^[[:space:]]*$/ { next }
              {
                line = $0
                sub(/^[[:space:]]+/, "", line)
                sub(/^[Ee][Xx][Pp][Oo][Rr][Tt][[:space:]]+/, "", line)
                if (index(line, key "=") == 1) {
                  value = substr(line, length(key) + 2)
                  sub(/^[[:space:]]+/, "", value)
                  sub(/[[:space:]]+$/, "", value)
                  if ((value ~ /^".*"$/) || (value ~ /^'\''.*'\''$/)) {
                    value = substr(value, 2, length(value) - 2)
                  }
                  print value
                  exit
                }
              }
            '
          }

          base_url="${PLAYWRIGHT_BASE_URL_OVERRIDE:-}"
          if [ -z "${base_url}" ]; then
            base_url="$(extract_from_home_server_env "CUSTOM_PROD_FRONTURL")"
          fi
          if [ -z "${base_url}" ]; then
            base_url="$(extract_from_home_server_env "HOME_FRONT_BASE_URL")"
          fi
          if [ -z "${base_url}" ]; then
            base_url="https://www.aquilaxk.site"
          fi

          case "${base_url}" in
            http://*|https://*) ;;
            *)
              echo "Invalid PLAYWRIGHT_BASE_URL: ${base_url}" >&2
              exit 1
              ;;
          esac

          echo "PLAYWRIGHT_BASE_URL=${base_url}" >> "$GITHUB_ENV"
          echo "Resolved live e2e base host: $(echo "${base_url}" | sed -E 's#https?://([^/]+).*#\1#')"

          # 라이브 E2E 전용 계정을 우선 사용하고, 없으면 운영 관리자 계정으로 fallback 한다.
          resolved_admin_username="${E2E_LIVE_ADMIN_USERNAME:-}"
          resolved_admin_password="${E2E_LIVE_ADMIN_PASSWORD:-}"

          if [ -z "${resolved_admin_username}" ]; then
            resolved_admin_username="$(extract_admin_from_home_server_env "CUSTOM__E2E__ADMIN__USERNAME")"
          fi
          if [ -z "${resolved_admin_password}" ]; then
            resolved_admin_password="$(extract_admin_from_home_server_env "CUSTOM__E2E__ADMIN__PASSWORD")"
          fi

          if [ -z "${resolved_admin_username}" ]; then
            resolved_admin_username="$(extract_admin_from_home_server_env "CUSTOM__ADMIN__USERNAME")"
          fi
          if [ -z "${resolved_admin_password}" ]; then
            resolved_admin_password="$(extract_admin_from_home_server_env "CUSTOM__ADMIN__PASSWORD")"
          fi

          if [ -z "${resolved_admin_username}" ]; then
            resolved_admin_username="${E2E_ADMIN_USERNAME:-}"
          fi
          if [ -z "${resolved_admin_password}" ]; then
            resolved_admin_password="${E2E_ADMIN_PASSWORD:-}"
          fi

          if [ -n "${resolved_admin_username}" ]; then
            echo "E2E_ADMIN_USERNAME=${resolved_admin_username}" >> "$GITHUB_ENV"
          fi
          if [ -n "${resolved_admin_password}" ]; then
            echo "E2E_ADMIN_PASSWORD=${resolved_admin_password}" >> "$GITHUB_ENV"
          fi

      - name: Verify live e2e secrets
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${E2E_ADMIN_USERNAME}" ] || (echo "E2E_ADMIN_USERNAME is required" && exit 1)
          [ -n "${E2E_ADMIN_PASSWORD}" ] || (echo "E2E_ADMIN_PASSWORD is required" && exit 1)

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: front/yarn.lock

      - name: Install dependencies
        working-directory: front
        run: yarn install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: front
        run: npx playwright install --with-deps chromium webkit

      - name: Run live production e2e
        working-directory: front
        run: yarn test:e2e:live

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: front-live-e2e-playwright-report
          path: |
            front/playwright-report
            front/test-results
          retention-days: 7

  makeTagAndRelease:
    runs-on: ubuntu-latest
    needs:
      - calculateTag
      - blueGreenDeploy
      - frontLiveE2E
    permissions:
      contents: write

    steps:
      - name: Create deployment release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "${{ needs.calculateTag.outputs.release_tag }}";
            const imageRef = "${{ needs.calculateTag.outputs.image_ref }}";

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: "${{ needs.calculateTag.outputs.deploy_sha }}"
            });

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: "${{ needs.calculateTag.outputs.deploy_sha }}",
              name: `Deploy ${tag}`,
              body: `Backend image: ${imageRef}\nWorkflow run: ${context.runId}`,
              generate_release_notes: true
            });
