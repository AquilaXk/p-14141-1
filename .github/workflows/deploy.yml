name: Deploy to Home Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: homeserver-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: gradle

      - name: Start test infrastructure (Postgres/Redis)
        run: docker compose -f back/devInfra/docker-compose.yml up -d

      - name: Run backend tests
        working-directory: back
        run: ./gradlew test

      - name: Stop test infrastructure
        if: always()
        run: docker compose -f back/devInfra/docker-compose.yml down -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required secrets
        shell: bash
        run: |
          required=(
            "TS_AUTHKEY=${{ secrets.TS_AUTHKEY }}"
            "HOME_SSH_USER=${{ secrets.HOME_SSH_USER }}"
            "HOME_APP_DIR=${{ secrets.HOME_APP_DIR }}"
            "HOME_HOST=${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}"
            "HOME_SSH_KEY=${{ secrets.HOME_SSH_KEY || secrets.HOME_SSH_PRIVATE_KEY }}"
            "HOME_SERVER_ENV=${{ secrets.HOME_SERVER_ENV }}"
          )

          for item in "${required[@]}"; do
            key="${item%%=*}"
            value="${item#*=}"
            if [ -z "$value" ]; then
              echo "$key missing"
              exit 1
            fi
            echo "$key present"
          done

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Diagnose Tailscale Route to Home SSH
        env:
          HOME_HOST: ${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}
          HOME_SSH_PORT: ${{ secrets.HOME_SSH_PORT || '22' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${HOME_HOST}" ]; then
            echo "HOME host secret is empty. Set HOME_TAILSCALE_HOST (or HOME_TS_HOST/HOME_SSH_HOST/HOME_HOST)." >&2
            exit 1
          fi

          echo "diagnose target: ${HOME_HOST}:${HOME_SSH_PORT}"
          tailscale status

          echo "tailscale ping test"
          if ! tailscale ping -c 3 "${HOME_HOST}"; then
            echo "tailscale ping did not establish direct path (DERP-only or transient). Continue and rely on TCP SSH connectivity test."
          fi

          echo "tcp connectivity test"
          if command -v nc >/dev/null 2>&1; then
            timeout 10 nc -zv "${HOME_HOST}" "${HOME_SSH_PORT}"
          else
            timeout 10 bash -lc "cat < /dev/null > /dev/tcp/${HOME_HOST}/${HOME_SSH_PORT}"
            echo "tcp open: ${HOME_HOST}:${HOME_SSH_PORT}"
          fi

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          SSH_DIR="${RUNNER_TEMP}/ssh"
          rm -rf "$SSH_DIR"
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"

          printf '%s\n' "${{ secrets.HOME_SSH_KEY || secrets.HOME_SSH_PRIVATE_KEY }}" > "$SSH_DIR/home_key"
          chmod 600 "$SSH_DIR/home_key"
          SSH_STRICT_OPTS="-o StrictHostKeyChecking=yes"
          if [ -n "${{ secrets.HOME_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.HOME_KNOWN_HOSTS }}" > "$SSH_DIR/known_hosts"
          else
            SSH_HOST="${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}"
            SSH_PORT="${{ secrets.HOME_SSH_PORT || '22' }}"

            if [ -z "${SSH_HOST}" ]; then
              echo "HOME host secret is empty. Set HOME_TAILSCALE_HOST (or HOME_TS_HOST/HOME_SSH_HOST/HOME_HOST)." >&2
              exit 1
            fi

            echo "Collecting known_hosts for ${SSH_HOST}:${SSH_PORT}"
            success=0
            for attempt in 1 2 3 4 5; do
              if timeout 10 ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" > "$SSH_DIR/known_hosts.tmp" 2>/dev/null; then
                if [ -s "$SSH_DIR/known_hosts.tmp" ]; then
                  mv "$SSH_DIR/known_hosts.tmp" "$SSH_DIR/known_hosts"
                  success=1
                  break
                fi
              fi
              echo "ssh-keyscan failed (attempt ${attempt}/5) for ${SSH_HOST}:${SSH_PORT}" >&2
              sleep 3
            done

            if [ "${success}" -ne 1 ]; then
              echo "Failed to build known_hosts, fallback to StrictHostKeyChecking=accept-new for this run." >&2
              : > "$SSH_DIR/known_hosts"
              SSH_STRICT_OPTS="-o StrictHostKeyChecking=accept-new"
            fi
          fi
          chmod 600 "$SSH_DIR/known_hosts"
          echo "SSH_DIR=$SSH_DIR" >> "$GITHUB_ENV"
          echo "SSH_STRICT_OPTS=$SSH_STRICT_OPTS" >> "$GITHUB_ENV"

      - name: Deploy over SSH
        env:
          HOME_HOST: ${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}
          HOME_SSH_USER: ${{ secrets.HOME_SSH_USER }}
          HOME_SSH_PORT: ${{ secrets.HOME_SSH_PORT }}
          HOME_APP_DIR: ${{ secrets.HOME_APP_DIR }}
          HOME_SERVER_ENV: ${{ secrets.HOME_SERVER_ENV }}
        run: |
          PORT="${HOME_SSH_PORT:-22}"

          ssh -i "$SSH_DIR/home_key" -o UserKnownHostsFile="$SSH_DIR/known_hosts" ${SSH_STRICT_OPTS} -o ConnectTimeout=15 -p "$PORT" "$HOME_SSH_USER@$HOME_HOST" \
            "HOME_APP_DIR='$HOME_APP_DIR' HOME_SERVER_ENV='$HOME_SERVER_ENV' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "${HOME_APP_DIR}"

          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          mkdir -p deploy/homeserver

          if [ -n "${HOME_SERVER_ENV:-}" ]; then
            printf '%s\n' "${HOME_SERVER_ENV}" > deploy/homeserver/.env.prod
          elif [ ! -f deploy/homeserver/.env.prod ]; then
            cp deploy/homeserver/.env.prod.example deploy/homeserver/.env.prod
            echo "deploy/homeserver/.env.prod created from example. Fill required values." >&2
            exit 1
          fi

          chmod +x deploy/homeserver/create_deploy_backup.sh deploy/homeserver/rollback_last_deploy.sh

          BACKUP_DIR="$(./deploy/homeserver/create_deploy_backup.sh)"
          echo "backup created: ${BACKUP_DIR}"

          if ! HEALTHCHECK_PATH=/actuator/health HEALTHCHECK_LOG_EVERY_N_TRIES=1 ./deploy/homeserver/blue_green_deploy.sh; then
            echo "deploy failed, rollback from backup: ${BACKUP_DIR}" >&2
            ./deploy/homeserver/rollback_last_deploy.sh "${BACKUP_DIR}" || true
            exit 1
          fi

          API_DOMAIN="$(awk -F= '$1=="API_DOMAIN"{print substr($0, index($0, "=")+1)}' deploy/homeserver/.env.prod)"
          if [ -n "${API_DOMAIN}" ]; then
            HTTP_CODE="$(docker run --rm --network blog_home_default curlimages/curl:8.7.1 -s -o /dev/null -w "%{http_code}" "http://caddy:80/actuator/health" -H "Host: ${API_DOMAIN}" || true)"
            echo "post-deploy caddy health status=${HTTP_CODE}"
            if ! echo "${HTTP_CODE}" | grep -Eq '^[1-4][0-9][0-9]$'; then
              echo "post-deploy healthcheck failed" >&2
              exit 1
            fi
          fi
          REMOTE

      - name: Create deployment release
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const tag = `deploy-${context.runId}-${sha}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: `Deploy ${tag}`,
              generate_release_notes: true
            });
