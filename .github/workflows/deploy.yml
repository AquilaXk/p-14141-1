name: Deploy to Home Server

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: homeserver-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  calculateTag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      (
        github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main'
      ) ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      )
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_latest_ref: ${{ steps.meta.outputs.image_latest_ref }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      deploy_sha: ${{ steps.meta.outputs.deploy_sha }}
      should_deploy: ${{ steps.meta.outputs.should_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Calculate image/release tags
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          CURRENT_RUN_ID: ${{ github.event.workflow_run.id || '' }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO_NAME="$(basename "${GITHUB_REPOSITORY}")"
          DEPLOY_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          SHORT_SHA="${DEPLOY_SHA::7}"

          IMAGE_NAME="ghcr.io/${OWNER_LC}/${REPO_NAME}-back"
          IMAGE_TAG="sha-${SHORT_SHA}"
          IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"
          IMAGE_LATEST_REF="${IMAGE_NAME}:latest"
          RELEASE_TAG="deploy-${GITHUB_RUN_ID}-${SHORT_SHA}"

          SHOULD_DEPLOY="true"
          if [ "${EVENT_NAME}" != "workflow_dispatch" ]; then
            REQUIRED_PATHS_PATTERN='^(back/|deploy/homeserver/|\.github/workflows/deploy\.yml|\.github/workflows/ci\.yml|\.github/workflows/reusable-backend-quality\.yml)'
            CHANGED_FILES=""
            CHANGE_SOURCE="head-commit"
            PREV_SUCCESS_SHA=""

            if command -v jq >/dev/null 2>&1 && [ -n "${CURRENT_RUN_ID}" ]; then
              runs_api="https://api.github.com/repos/${REPOSITORY}/actions/workflows/ci.yml/runs?branch=main&event=push&status=success&per_page=20"
              runs_json="$(curl -fsSL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${runs_api}" || true)"
              if [ -n "${runs_json}" ]; then
                PREV_SUCCESS_SHA="$(
                  echo "${runs_json}" |
                    jq -r --argjson current "${CURRENT_RUN_ID}" '.workflow_runs[] | select(.id != $current) | .head_sha' |
                    head -n 1
                )"
              fi
            fi

            if [ -n "${PREV_SUCCESS_SHA}" ]; then
              compare_api="https://api.github.com/repos/${REPOSITORY}/compare/${PREV_SUCCESS_SHA}...${DEPLOY_SHA}"
              compare_json="$(curl -fsSL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "${compare_api}" || true)"
              if [ -n "${compare_json}" ] && echo "${compare_json}" | jq -e '.files' >/dev/null 2>&1; then
                files_len="$(echo "${compare_json}" | jq '.files | length')"
                if [ "${files_len}" -ge 300 ]; then
                  # GitHub compare API files 배열은 최대 300개라서 절단 가능성이 있다.
                  # 절단 시 false-negative(배포 누락)를 피하기 위해 안전하게 deploy=true로 둔다.
                  CHANGED_FILES=""
                else
                  CHANGED_FILES="$(echo "${compare_json}" | jq -r '.files[].filename')"
                  CHANGE_SOURCE="compare:${PREV_SUCCESS_SHA}...${DEPLOY_SHA}"
                fi
              fi
            fi

            if [ -z "${CHANGED_FILES}" ]; then
              CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "${DEPLOY_SHA}" || true)"
              CHANGE_SOURCE="${CHANGE_SOURCE} -> fallback:head-commit"
            fi

            if [ -n "${CHANGED_FILES}" ] && ! echo "${CHANGED_FILES}" | grep -Eq "${REQUIRED_PATHS_PATTERN}"; then
              SHOULD_DEPLOY="false"
            fi

            echo "should_deploy_source=${CHANGE_SOURCE}"
          fi

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "image_latest_ref=${IMAGE_LATEST_REF}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=${DEPLOY_SHA}" >> "$GITHUB_OUTPUT"
          echo "should_deploy=${SHOULD_DEPLOY}" >> "$GITHUB_OUTPUT"

  buildAndPush:
    runs-on: ubuntu-latest
    needs: calculateTag
    if: needs.calculateTag.outputs.should_deploy == 'true'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.calculateTag.outputs.deploy_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./back
          file: ./back/Dockerfile
          push: true
          tags: |
            ${{ needs.calculateTag.outputs.image_ref }}
            ${{ needs.calculateTag.outputs.image_latest_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  blueGreenDeploy:
    runs-on: ubuntu-latest
    needs:
      - calculateTag
      - buildAndPush
    if: needs.calculateTag.outputs.should_deploy == 'true'
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.calculateTag.outputs.deploy_sha }}

      - name: Verify required secrets
        shell: bash
        run: |
          required=(
            "TS_AUTHKEY=${{ secrets.TS_AUTHKEY }}"
            "HOME_SSH_USER=${{ secrets.HOME_SSH_USER }}"
            "HOME_APP_DIR=${{ secrets.HOME_APP_DIR }}"
            "HOME_HOST=${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}"
            "HOME_SSH_KEY=${{ secrets.HOME_SSH_KEY || secrets.HOME_SSH_PRIVATE_KEY }}"
            "HOME_SERVER_ENV=${{ secrets.HOME_SERVER_ENV }}"
          )

          for item in "${required[@]}"; do
            key="${item%%=*}"
            value="${item#*=}"
            if [ -z "$value" ]; then
              echo "$key missing"
              exit 1
            fi
            echo "$key present"
          done

      - name: Connect to Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Diagnose Tailscale Route to Home SSH
        env:
          HOME_HOST: ${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}
          HOME_SSH_PORT: ${{ secrets.HOME_SSH_PORT || '22' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${HOME_HOST}" ]; then
            echo "HOME host secret is empty. Set HOME_TAILSCALE_HOST (or HOME_TS_HOST/HOME_SSH_HOST/HOME_HOST)." >&2
            exit 1
          fi

          echo "diagnose target: ${HOME_HOST}:${HOME_SSH_PORT}"
          tailscale status

          echo "tailscale ping test"
          if ! tailscale ping -c 3 "${HOME_HOST}"; then
            echo "tailscale ping did not establish direct path (DERP-only or transient). Continue and rely on TCP SSH connectivity test."
          fi

          echo "tcp connectivity test"
          if command -v nc >/dev/null 2>&1; then
            timeout 10 nc -zv "${HOME_HOST}" "${HOME_SSH_PORT}"
          else
            timeout 10 bash -lc "cat < /dev/null > /dev/tcp/${HOME_HOST}/${HOME_SSH_PORT}"
            echo "tcp open: ${HOME_HOST}:${HOME_SSH_PORT}"
          fi

      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          SSH_DIR="${RUNNER_TEMP}/ssh"
          rm -rf "$SSH_DIR"
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"

          printf '%s\n' "${{ secrets.HOME_SSH_KEY || secrets.HOME_SSH_PRIVATE_KEY }}" > "$SSH_DIR/home_key"
          chmod 600 "$SSH_DIR/home_key"
          if [ -n "${{ secrets.HOME_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.HOME_KNOWN_HOSTS }}" > "$SSH_DIR/known_hosts"
          else
            SSH_HOST="${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}"
            SSH_PORT="${{ secrets.HOME_SSH_PORT || '22' }}"

            if [ -z "${SSH_HOST}" ]; then
              echo "HOME host secret is empty. Set HOME_TAILSCALE_HOST (or HOME_TS_HOST/HOME_SSH_HOST/HOME_HOST)." >&2
              exit 1
            fi

            echo "Collecting known_hosts for ${SSH_HOST}:${SSH_PORT}"
            success=0
            for attempt in 1 2 3 4 5; do
              if timeout 10 ssh-keyscan -p "${SSH_PORT}" -H "${SSH_HOST}" > "$SSH_DIR/known_hosts.tmp" 2>/dev/null; then
                if [ -s "$SSH_DIR/known_hosts.tmp" ]; then
                  mv "$SSH_DIR/known_hosts.tmp" "$SSH_DIR/known_hosts"
                  success=1
                  break
                fi
              fi
              echo "ssh-keyscan failed (attempt ${attempt}/5) for ${SSH_HOST}:${SSH_PORT}" >&2
              sleep 3
            done

            if [ "${success}" -ne 1 ]; then
              echo "Failed to build known_hosts. Set HOME_KNOWN_HOSTS explicitly or fix ssh-keyscan connectivity." >&2
              exit 1
            fi
          fi
          chmod 600 "$SSH_DIR/known_hosts"
          echo "SSH_DIR=$SSH_DIR" >> "$GITHUB_ENV"

      - name: Deploy over SSH (pull image + blue/green switch)
        env:
          HOME_HOST: ${{ secrets.HOME_TAILSCALE_HOST || secrets.HOME_TS_HOST || secrets.HOME_SSH_HOST || secrets.HOME_HOST }}
          HOME_SSH_USER: ${{ secrets.HOME_SSH_USER }}
          HOME_SSH_PORT: ${{ secrets.HOME_SSH_PORT }}
          HOME_APP_DIR: ${{ secrets.HOME_APP_DIR }}
          HOME_SERVER_ENV: ${{ secrets.HOME_SERVER_ENV }}
          HOME_BACK_IMAGE: ${{ needs.calculateTag.outputs.image_ref }}
          HOME_DEPLOY_SHA: ${{ needs.calculateTag.outputs.deploy_sha }}
          HOME_GHCR_USERNAME: ${{ secrets.HOME_GHCR_USERNAME }}
          HOME_GHCR_TOKEN: ${{ secrets.HOME_GHCR_TOKEN }}
          HOME_AI_SUMMARY_ENABLED: ${{ secrets.CUSTOM__AI__SUMMARY__ENABLED || vars.CUSTOM__AI__SUMMARY__ENABLED || '' }}
          HOME_AI_SUMMARY_GEMINI_API_KEY: ${{ secrets.CUSTOM__AI__SUMMARY__GEMINI__API_KEY || vars.CUSTOM__AI__SUMMARY__GEMINI__API_KEY || '' }}
          HOME_AI_SUMMARY_GEMINI_MODEL: ${{ secrets.CUSTOM__AI__SUMMARY__GEMINI__MODEL || vars.CUSTOM__AI__SUMMARY__GEMINI__MODEL || '' }}
        run: |
          PORT="${HOME_SSH_PORT:-22}"
          HOME_APP_DIR_B64="$(printf '%s' "${HOME_APP_DIR}" | base64 | tr -d '\n')"
          HOME_SERVER_ENV_B64="$(printf '%s' "${HOME_SERVER_ENV}" | base64 | tr -d '\n')"
          HOME_BACK_IMAGE_B64="$(printf '%s' "${HOME_BACK_IMAGE:-}" | base64 | tr -d '\n')"
          HOME_DEPLOY_SHA_B64="$(printf '%s' "${HOME_DEPLOY_SHA:-}" | base64 | tr -d '\n')"
          HOME_GHCR_USERNAME_B64="$(printf '%s' "${HOME_GHCR_USERNAME:-}" | base64 | tr -d '\n')"
          HOME_GHCR_TOKEN_B64="$(printf '%s' "${HOME_GHCR_TOKEN:-}" | base64 | tr -d '\n')"
          HOME_AI_SUMMARY_ENABLED_B64="$(printf '%s' "${HOME_AI_SUMMARY_ENABLED:-}" | base64 | tr -d '\n')"
          HOME_AI_SUMMARY_GEMINI_API_KEY_B64="$(printf '%s' "${HOME_AI_SUMMARY_GEMINI_API_KEY:-}" | base64 | tr -d '\n')"
          HOME_AI_SUMMARY_GEMINI_MODEL_B64="$(printf '%s' "${HOME_AI_SUMMARY_GEMINI_MODEL:-}" | base64 | tr -d '\n')"

          ssh -i "$SSH_DIR/home_key" -o UserKnownHostsFile="$SSH_DIR/known_hosts" -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 -p "$PORT" "$HOME_SSH_USER@$HOME_HOST" \
            "HOME_APP_DIR_B64='${HOME_APP_DIR_B64}' HOME_SERVER_ENV_B64='${HOME_SERVER_ENV_B64}' HOME_BACK_IMAGE_B64='${HOME_BACK_IMAGE_B64}' HOME_DEPLOY_SHA_B64='${HOME_DEPLOY_SHA_B64}' HOME_GHCR_USERNAME_B64='${HOME_GHCR_USERNAME_B64}' HOME_GHCR_TOKEN_B64='${HOME_GHCR_TOKEN_B64}' HOME_AI_SUMMARY_ENABLED_B64='${HOME_AI_SUMMARY_ENABLED_B64}' HOME_AI_SUMMARY_GEMINI_API_KEY_B64='${HOME_AI_SUMMARY_GEMINI_API_KEY_B64}' HOME_AI_SUMMARY_GEMINI_MODEL_B64='${HOME_AI_SUMMARY_GEMINI_MODEL_B64}' bash -s" <<'REMOTE'
          set -euo pipefail

          decode_b64() {
            if printf '' | base64 --decode >/dev/null 2>&1; then
              printf '%s' "$1" | base64 --decode
            else
              printf '%s' "$1" | base64 -d
            fi
          }

          HOME_APP_DIR="$(decode_b64 "${HOME_APP_DIR_B64:-}")"
          HOME_SERVER_ENV="$(decode_b64 "${HOME_SERVER_ENV_B64:-}")"
          HOME_BACK_IMAGE="$(decode_b64 "${HOME_BACK_IMAGE_B64:-}")"
          HOME_DEPLOY_SHA="$(decode_b64 "${HOME_DEPLOY_SHA_B64:-}")"
          HOME_GHCR_USERNAME="$(decode_b64 "${HOME_GHCR_USERNAME_B64:-}")"
          HOME_GHCR_TOKEN="$(decode_b64 "${HOME_GHCR_TOKEN_B64:-}")"
          HOME_AI_SUMMARY_ENABLED="$(decode_b64 "${HOME_AI_SUMMARY_ENABLED_B64:-}")"
          HOME_AI_SUMMARY_GEMINI_API_KEY="$(decode_b64 "${HOME_AI_SUMMARY_GEMINI_API_KEY_B64:-}")"
          HOME_AI_SUMMARY_GEMINI_MODEL="$(decode_b64 "${HOME_AI_SUMMARY_GEMINI_MODEL_B64:-}")"

          upsert_env_key() {
            local key="$1"
            local value="$2"
            local file="$3"
            [ -z "${value}" ] && return 0

            if grep -qE "^${key}=" "${file}"; then
              grep -vE "^${key}=" "${file}" > "${file}.tmp"
              printf '%s=%s\n' "${key}" "${value}" >> "${file}.tmp"
              mv "${file}.tmp" "${file}"
            else
              printf '%s=%s\n' "${key}" "${value}" >> "${file}"
            fi
          }

          remove_env_key() {
            local key="$1"
            local file="$2"

            if grep -qE "^${key}=" "${file}"; then
              grep -vE "^${key}=" "${file}" > "${file}.tmp"
              mv "${file}.tmp" "${file}"
            fi
          }

          cd "${HOME_APP_DIR}"

          if [ -z "${HOME_DEPLOY_SHA:-}" ]; then
            echo "HOME_DEPLOY_SHA is empty. abort deploy." >&2
            exit 1
          fi

          git fetch origin main --prune
          if ! git cat-file -e "${HOME_DEPLOY_SHA}^{commit}" 2>/dev/null; then
            git fetch origin "${HOME_DEPLOY_SHA}" --depth 1 || true
          fi
          if ! git cat-file -e "${HOME_DEPLOY_SHA}^{commit}" 2>/dev/null; then
            echo "deploy sha not found in remote repository: ${HOME_DEPLOY_SHA}" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "${HOME_DEPLOY_SHA}" "origin/main"; then
            echo "deploy sha is not reachable from origin/main: ${HOME_DEPLOY_SHA}" >&2
            exit 1
          fi
          git checkout --force "${HOME_DEPLOY_SHA}"

          mkdir -p deploy/homeserver

          if [ -n "${HOME_SERVER_ENV:-}" ]; then
            printf '%s\n' "${HOME_SERVER_ENV}" > deploy/homeserver/.env.prod
          elif [ ! -f deploy/homeserver/.env.prod ]; then
            cp deploy/homeserver/.env.prod.example deploy/homeserver/.env.prod
            echo "deploy/homeserver/.env.prod created from example. Fill required values." >&2
            exit 1
          fi

          upsert_env_key "CUSTOM__AI__SUMMARY__ENABLED" "${HOME_AI_SUMMARY_ENABLED:-}" "deploy/homeserver/.env.prod"
          upsert_env_key "CUSTOM__AI__SUMMARY__GEMINI__API_KEY" "${HOME_AI_SUMMARY_GEMINI_API_KEY:-}" "deploy/homeserver/.env.prod"
          upsert_env_key "CUSTOM__AI__SUMMARY__GEMINI__MODEL" "${HOME_AI_SUMMARY_GEMINI_MODEL:-}" "deploy/homeserver/.env.prod"

          # prod에서 sql.init 경로가 켜지면 부팅 실패(DO $$ 분리/DDL 충돌)로 이어질 수 있다.
          # HOME_SERVER_ENV 드리프트가 있어도 배포 직전에 안전값으로 강제한다.
          remove_env_key "SPRING_SQL_INIT_SCHEMA_LOCATIONS" "deploy/homeserver/.env.prod"
          remove_env_key "SPRING_SQL_INIT_DATA_LOCATIONS" "deploy/homeserver/.env.prod"
          remove_env_key "SPRING_SQL_INIT_CONTINUE_ON_ERROR" "deploy/homeserver/.env.prod"
          upsert_env_key "SPRING_SQL_INIT_MODE" "never" "deploy/homeserver/.env.prod"

          extract_env_value() {
            local key="$1"
            awk -F= -v k="$key" '
              $1==k {
                value=substr($0, index($0, "=")+1)
                gsub(/\r/, "", value)
                gsub(/^"/, "", value)
                gsub(/"$/, "", value)
                gsub(/^'\''/, "", value)
                gsub(/'\''$/, "", value)
                print value
              }
            ' deploy/homeserver/.env.prod | tail -n 1
          }

          resolve_local_repo_digest() {
            local image_ref="$1"
            docker image inspect --format '{{index .RepoDigests 0}}' "${image_ref}" 2>/dev/null | head -n 1 | tr -d '\r'
          }

          ensure_image_key_from_local_digest() {
            local key="$1"
            local fallback_image="$2"
            local value
            value="$(extract_env_value "${key}")"
            if [ -n "${value}" ]; then
              return 0
            fi

            local digest
            digest="$(resolve_local_repo_digest "${fallback_image}" || true)"
            if [ -n "${digest}" ]; then
              upsert_env_key "${key}" "${digest}" "deploy/homeserver/.env.prod"
              echo "auto-filled ${key} from local digest (${fallback_image} -> ${digest})"
              return 0
            fi

            echo "required image env key is missing and local digest lookup failed: ${key} (fallback=${fallback_image})" >&2
            return 1
          }

          require_nonempty_env_key() {
            local key="$1"
            local value
            value="$(extract_env_value "${key}")"
            if [ -z "${value}" ]; then
              echo "required env key is missing or empty: ${key}" >&2
              exit 1
            fi
          }

          require_pinned_image_key() {
            local key="$1"
            local value
            value="$(extract_env_value "${key}")"
            if [ -z "${value}" ]; then
              echo "required image env key is missing: ${key}" >&2
              exit 1
            fi
            if [[ "${value}" == *":latest" ]]; then
              echo "latest tag is not allowed for ${key}: ${value}" >&2
              exit 1
            fi
            if [[ "${value}" != *@sha256:* && "${value}" != *:* ]]; then
              echo "image must have tag or digest for ${key}: ${value}" >&2
              exit 1
            fi
          }

          require_nonempty_env_key "CF_TUNNEL_TOKEN"
          ensure_image_key_from_local_digest "CLOUDFLARED_IMAGE" "cloudflare/cloudflared:latest"
          ensure_image_key_from_local_digest "DB_IMAGE" "jangka512/pgj:latest"
          ensure_image_key_from_local_digest "MINIO_IMAGE" "minio/minio:latest"
          require_pinned_image_key "CLOUDFLARED_IMAGE"
          require_pinned_image_key "DB_IMAGE"
          require_pinned_image_key "MINIO_IMAGE"

          DB_BASE_NAME_VALUE="$(extract_env_value "DB_BASE_NAME")"
          CUSTOM_PROD_DBNAME_VALUE="$(extract_env_value "CUSTOM_PROD_DBNAME")"
          TARGET_DB_NAME="${CUSTOM_PROD_DBNAME_VALUE:-}"
          if [ -z "${TARGET_DB_NAME}" ]; then
            if [ -n "${DB_BASE_NAME_VALUE}" ]; then
              TARGET_DB_NAME="${DB_BASE_NAME_VALUE}_prod"
            else
              TARGET_DB_NAME="blog_prod"
            fi
          fi

          pgroonga_precheck_fail() {
            local code="$1"
            local detail="$2"
            echo "::error title=PGroonga precheck failed::[PGROONGA_PRECHECK_FAILED] code=${code} db=${TARGET_DB_NAME} detail=${detail}"
            echo "[PGROONGA_PRECHECK_FAILED] code=${code} db=${TARGET_DB_NAME} detail=${detail}" >&2
            exit 1
          }

          echo "pgroonga precheck target db=${TARGET_DB_NAME}"
          docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml up -d db_1 >/dev/null

          echo "pgroonga install attempt"
          if ! docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml exec -T db_1 sh -lc "psql -U postgres -d '${TARGET_DB_NAME}' -v ON_ERROR_STOP=1 -c \"CREATE EXTENSION IF NOT EXISTS pgroonga;\""; then
            pgroonga_precheck_fail "install_failed" "create_extension_failed"
          fi

          PGROONGA_EXT_OK="$(docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml exec -T db_1 sh -lc "psql -U postgres -d '${TARGET_DB_NAME}' -tAc \"SELECT EXISTS (SELECT 1 FROM pg_extension WHERE extname='pgroonga');\"" 2>/dev/null | tr -d '\r' | xargs || true)"
          if [ "${PGROONGA_EXT_OK}" != "t" ]; then
            pgroonga_precheck_fail "extension_missing" "pg_extension_not_found"
          fi

          PGROONGA_OP_OK="$(docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml exec -T db_1 sh -lc "psql -U postgres -d '${TARGET_DB_NAME}' -tAc \"SELECT (ARRAY['ping'::text, 'pong'::text] &@~ 'ping');\"" 2>/dev/null | tr -d '\r' | xargs || true)"
          if [ "${PGROONGA_OP_OK}" != "t" ]; then
            pgroonga_precheck_fail "operator_failed" "andatilde_operator_check_failed"
          fi

          echo "pgroonga precheck passed"

          enabled_value="$(awk -F= '$1=="CUSTOM__AI__SUMMARY__ENABLED"{print tolower($2)}' deploy/homeserver/.env.prod | tail -n 1 | tr -d '"' | tr -d '[:space:]')"
          api_key_value="$(awk -F= '$1=="CUSTOM__AI__SUMMARY__GEMINI__API_KEY"{print substr($0, index($0, "=")+1)}' deploy/homeserver/.env.prod | tail -n 1)"
          if [ "${enabled_value}" = "true" ] && [ -z "${api_key_value}" ]; then
            echo "CUSTOM__AI__SUMMARY__ENABLED=true but CUSTOM__AI__SUMMARY__GEMINI__API_KEY is empty." >&2
            exit 1
          fi

          if [ -z "${HOME_BACK_IMAGE:-}" ]; then
            echo "HOME_BACK_IMAGE is empty. abort deploy to avoid pulling stale latest image." >&2
            exit 1
          fi
          export BACK_IMAGE="${HOME_BACK_IMAGE}"

          echo "Deploying image: ${BACK_IMAGE:-unset}"

          if [ -n "${HOME_GHCR_USERNAME:-}" ] && [ -n "${HOME_GHCR_TOKEN:-}" ]; then
            echo "${HOME_GHCR_TOKEN}" | docker login ghcr.io -u "${HOME_GHCR_USERNAME}" --password-stdin
          fi

          chmod +x \
            deploy/homeserver/create_deploy_backup.sh \
            deploy/homeserver/blue_green_deploy.sh \
            deploy/homeserver/rollback_last_deploy.sh \
            deploy/homeserver/steady_state_guard.sh \
            deploy/homeserver/install_steady_state_guard_cron.sh

          BACKUP_DIR="$(./deploy/homeserver/create_deploy_backup.sh)"
          echo "backup created: ${BACKUP_DIR}"

          emit_post_deploy_diagnostics() {
            echo "[post-deploy-diagnostic] compose ps"
            docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml ps || true
            echo "[post-deploy-diagnostic] caddy logs"
            docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml logs --no-color --tail=120 caddy || true
            echo "[post-deploy-diagnostic] cloudflared logs"
            docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml logs --no-color --tail=120 cloudflared || true
            echo "[post-deploy-diagnostic] active backend logs (${ACTIVE_BACKEND:-unknown})"
            if [ -n "${ACTIVE_BACKEND:-}" ]; then
              docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml logs --no-color --tail=120 "${ACTIVE_BACKEND}" || true
            fi
          }

          rollback_and_exit() {
            local reason="$1"
            echo "deploy verification failed: ${reason}" >&2
            emit_post_deploy_diagnostics
            if [ -n "${BACKUP_DIR:-}" ] && [ -d "${BACKUP_DIR}" ]; then
              echo "rollback from backup: ${BACKUP_DIR}" >&2
              ./deploy/homeserver/rollback_last_deploy.sh "${BACKUP_DIR}" || true
            fi
            exit 1
          }

          if ! HEALTHCHECK_PATH=/actuator/health/readiness HEALTHCHECK_LOG_EVERY_N_TRIES=1 ./deploy/homeserver/blue_green_deploy.sh; then
            rollback_and_exit "blue_green_deploy_failed"
          fi

          API_DOMAIN="$(awk -F= '$1=="API_DOMAIN"{print substr($0, index($0, "=")+1)}' deploy/homeserver/.env.prod)"
          if [ -z "${API_DOMAIN}" ]; then
            rollback_and_exit "missing_api_domain"
          fi

          ACTIVE_BACKEND="$(cat deploy/homeserver/.active_backend 2>/dev/null || true)"
          if [ "${ACTIVE_BACKEND}" != "back_blue" ] && [ "${ACTIVE_BACKEND}" != "back_green" ]; then
            rollback_and_exit "invalid_active_backend"
          fi

          if ! docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml ps --status running --services | grep -qx "${ACTIVE_BACKEND}"; then
            rollback_and_exit "active_backend_not_running"
          fi

          if [ "${ACTIVE_BACKEND}" = "back_blue" ]; then
            EXPECTED_UPSTREAM="back-blue"
            INACTIVE_BACKEND="back_green"
          else
            EXPECTED_UPSTREAM="back-green"
            INACTIVE_BACKEND="back_blue"
          fi

          MOUNTED_UPSTREAM="$(docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml exec -T caddy sh -lc "awk '\$1 == \"reverse_proxy\" && \$2 ~ /^back-(blue|green):8080$/ {split(\$2, a, \":\"); print a[1]; exit}' /etc/caddy/Caddyfile" 2>/dev/null | tr -d '\r' | head -n 1)"
          HAS_LEGACY_BACK_ACTIVE="false"
          if docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml exec -T caddy sh -lc "grep -Eq 'back[-_]active:8080' /etc/caddy/Caddyfile"; then
            HAS_LEGACY_BACK_ACTIVE="true"
          fi

          echo "post-deploy upstream verify: active_backend=${ACTIVE_BACKEND}, expected=${EXPECTED_UPSTREAM}, mounted=${MOUNTED_UPSTREAM:-none}, legacy_back_active=${HAS_LEGACY_BACK_ACTIVE}"
          if [ -z "${MOUNTED_UPSTREAM}" ] || [ "${MOUNTED_UPSTREAM}" != "${EXPECTED_UPSTREAM}" ] || [ "${HAS_LEGACY_BACK_ACTIVE}" = "true" ]; then
            rollback_and_exit "caddy_upstream_mismatch"
          fi

          if docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml ps --status running --services | grep -qx "${INACTIVE_BACKEND}"; then
            rollback_and_exit "inactive_backend_still_running"
          fi

          HTTP_CODE="$(docker run --rm --network blog_home_default curlimages/curl:8.7.1 -s -o /dev/null -w "%{http_code}" "http://caddy:80/actuator/health/readiness" -H "Host: ${API_DOMAIN}" || true)"
          echo "post-deploy caddy health status=${HTTP_CODE}"
          if ! echo "${HTTP_CODE}" | grep -Eq '^200$'; then
            rollback_and_exit "caddy_route_healthcheck_failed"
          fi

          wait_public_api_health() {
            local api_domain="$1"
            local attempts="${DEPLOY_PUBLIC_API_ATTEMPTS:-12}"
            local connect_timeout="${DEPLOY_PUBLIC_API_CONNECT_TIMEOUT_SECONDS:-5}"
            local max_time="${DEPLOY_PUBLIC_API_MAX_TIME_SECONDS:-15}"
            local sleep_seconds="${DEPLOY_PUBLIC_API_SLEEP_SECONDS:-5}"
            local restarted=0
            local code

            for attempt in $(seq 1 "${attempts}"); do
              code="$(curl -sS --connect-timeout "${connect_timeout}" -m "${max_time}" -o /dev/null -w "%{http_code}" "https://${api_domain}/actuator/health/readiness" || true)"
              echo "post-deploy public-api health attempt=${attempt}/${attempts} status=${code}"
              if [[ "${code}" =~ ^[1-4][0-9][0-9]$ ]]; then
                return 0
              fi

              if [ "${code}" = "000" ] && [ "${restarted}" -eq 0 ] && [ "${attempt}" -ge 3 ]; then
                echo "public-api timeout detected; restarting cloudflared once"
                docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml restart cloudflared || true
                restarted=1
                sleep 8
              fi

              sleep "${sleep_seconds}"
            done

            echo "post-deploy public-api healthcheck failed for https://${api_domain}/actuator/health/readiness" >&2
            docker compose --env-file deploy/homeserver/.env.prod -f deploy/homeserver/docker-compose.prod.yml logs --no-color --tail=120 cloudflared >&2 || true
            return 1
          }

          if ! wait_public_api_health "${API_DOMAIN}"; then
            rollback_and_exit "public_api_healthcheck_failed"
          fi

          run_canary_ratio_check() {
            local label="$1"
            local url="$2"
            local attempts="${DEPLOY_CANARY_ATTEMPTS:-10}"
            local min_success_percent="${DEPLOY_CANARY_MIN_SUCCESS_PERCENT:-90}"
            local connect_timeout="${DEPLOY_CANARY_CONNECT_TIMEOUT_SECONDS:-5}"
            local max_time="${DEPLOY_CANARY_MAX_TIME_SECONDS:-12}"

            local success=0
            local code
            for attempt in $(seq 1 "${attempts}"); do
              code="$(
                curl -sS \
                  --connect-timeout "${connect_timeout}" \
                  -m "${max_time}" \
                  -o /dev/null \
                  -w "%{http_code}" \
                  "${url}" || true
              )"
              echo "[post-deploy-canary] ${label} attempt=${attempt}/${attempts} status=${code}"
              if [ "${code}" = "200" ]; then
                success=$((success + 1))
              fi
            done

            local success_percent
            success_percent="$(awk -v s="${success}" -v a="${attempts}" 'BEGIN { printf "%.1f", (a == 0 ? 0 : (s * 100.0) / a) }')"
            local required_success
            required_success=$(( (attempts * min_success_percent + 99) / 100 ))

            echo "[post-deploy-canary] ${label} success=${success}/${attempts} (${success_percent}%), threshold=${min_success_percent}%"
            [ "${success}" -ge "${required_success}" ]
          }

          extract_canary_post_id() {
            local feed_url="$1"
            local connect_timeout="${DEPLOY_CANARY_CONNECT_TIMEOUT_SECONDS:-5}"
            local max_time="${DEPLOY_CANARY_MAX_TIME_SECONDS:-12}"
            local body
            body="$(
              curl -sS \
                --connect-timeout "${connect_timeout}" \
                -m "${max_time}" \
                "${feed_url}" || true
            )"
            [ -z "${body}" ] && return 1

            local post_id=""
            if command -v python3 >/dev/null 2>&1; then
              post_id="$(
                printf '%s' "${body}" | python3 -c 'import json,sys; payload=json.load(sys.stdin); data=payload.get("data") or {}; content=data.get("content") or []; value=content[0].get("id") if content and isinstance(content[0], dict) else None; print(value if isinstance(value, int) else "")' 2>/dev/null || true
              )"
            fi

            if [ -z "${post_id}" ]; then
              post_id="$(printf '%s' "${body}" | grep -oE '"id":[0-9]+' | head -n 1 | cut -d: -f2 || true)"
            fi

            [ -n "${post_id}" ] && printf '%s' "${post_id}"
          }

          FEED_URL="https://${API_DOMAIN}/post/api/v1/posts/feed?page=1&pageSize=30&sort=CREATED_AT"
          EXPLORE_URL="https://${API_DOMAIN}/post/api/v1/posts/explore?kw=&tag=&sort=CREATED_AT&page=1&pageSize=30"

          if ! run_canary_ratio_check "feed" "${FEED_URL}"; then
            rollback_and_exit "post_public_read_canary_feed_failed"
          fi

          if ! run_canary_ratio_check "explore" "${EXPLORE_URL}"; then
            rollback_and_exit "post_public_read_canary_explore_failed"
          fi

          DETAIL_POST_ID="$(extract_canary_post_id "${FEED_URL}" || true)"
          if [ -z "${DETAIL_POST_ID}" ]; then
            rollback_and_exit "post_public_read_canary_missing_post_id"
          fi
          DETAIL_URL="https://${API_DOMAIN}/post/api/v1/posts/${DETAIL_POST_ID}"

          if ! run_canary_ratio_check "detail(${DETAIL_POST_ID})" "${DETAIL_URL}"; then
            rollback_and_exit "post_public_read_canary_detail_failed"
          fi
          REMOTE

  frontLiveE2E:
    runs-on: ubuntu-latest
    needs:
      - calculateTag
      - blueGreenDeploy
    if: needs.calculateTag.outputs.should_deploy == 'true'
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      PLAYWRIGHT_BASE_URL_OVERRIDE: ${{ secrets.CUSTOM_PROD_FRONTURL || vars.CUSTOM_PROD_FRONTURL || secrets.HOME_FRONT_BASE_URL || vars.HOME_FRONT_BASE_URL || '' }}
      E2E_API_BASE_URL_OVERRIDE: ${{ secrets.CUSTOM_PROD_BACKURL || vars.CUSTOM_PROD_BACKURL || '' }}
      PLAYWRIGHT_USE_WEBSERVER: "false"
      HOME_SERVER_ENV: ${{ secrets.HOME_SERVER_ENV }}
      E2E_LIVE_ADMIN_USERNAME: ${{ secrets.E2E_LIVE_ADMIN_USERNAME || '' }}
      E2E_LIVE_ADMIN_PASSWORD: ${{ secrets.E2E_LIVE_ADMIN_PASSWORD || '' }}
      E2E_ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME || '' }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.calculateTag.outputs.deploy_sha }}

      - name: Resolve live e2e base URL
        shell: bash
        run: |
          set -euo pipefail

          extract_from_home_server_env() {
            local key="$1"
            printf '%s\n' "${HOME_SERVER_ENV:-}" | tr -d '\r' | awk -v key="$key" '
              /^[[:space:]]*#/ { next }
              /^[[:space:]]*$/ { next }
              {
                line = $0
                sub(/^[[:space:]]+/, "", line)
                sub(/^[Ee][Xx][Pp][Oo][Rr][Tt][[:space:]]+/, "", line)
                if (index(line, key "=") == 1) {
                  value = substr(line, length(key) + 2)
                  sub(/^[[:space:]]+/, "", value)
                  sub(/[[:space:]]+$/, "", value)
                  if ((value ~ /^".*"$/) || (value ~ /^'\''.*'\''$/)) {
                    value = substr(value, 2, length(value) - 2)
                  }
                  print value
                  exit
                }
              }
            '
          }

          extract_admin_from_home_server_env() {
            local key="$1"
            printf '%s\n' "${HOME_SERVER_ENV:-}" | tr -d '\r' | awk -v key="$key" '
              /^[[:space:]]*#/ { next }
              /^[[:space:]]*$/ { next }
              {
                line = $0
                sub(/^[[:space:]]+/, "", line)
                sub(/^[Ee][Xx][Pp][Oo][Rr][Tt][[:space:]]+/, "", line)
                if (index(line, key "=") == 1) {
                  value = substr(line, length(key) + 2)
                  sub(/^[[:space:]]+/, "", value)
                  sub(/[[:space:]]+$/, "", value)
                  if ((value ~ /^".*"$/) || (value ~ /^'\''.*'\''$/)) {
                    value = substr(value, 2, length(value) - 2)
                  }
                  print value
                  exit
                }
              }
            '
          }

          base_url="${PLAYWRIGHT_BASE_URL_OVERRIDE:-}"
          if [ -z "${base_url}" ]; then
            base_url="$(extract_from_home_server_env "CUSTOM_PROD_FRONTURL")"
          fi
          if [ -z "${base_url}" ]; then
            base_url="$(extract_from_home_server_env "HOME_FRONT_BASE_URL")"
          fi
          if [ -z "${base_url}" ]; then
            base_url="https://www.aquilaxk.site"
          fi

          case "${base_url}" in
            http://*|https://*) ;;
            *)
              echo "Invalid PLAYWRIGHT_BASE_URL: ${base_url}" >&2
              exit 1
              ;;
          esac

          echo "PLAYWRIGHT_BASE_URL=${base_url}" >> "$GITHUB_ENV"
          echo "Resolved live e2e base host: $(echo "${base_url}" | sed -E 's#https?://([^/]+).*#\1#')"

          base_scheme="$(echo "${base_url}" | sed -E 's#(https?)://.*#\1#')"
          api_base_url="${E2E_API_BASE_URL_OVERRIDE:-}"
          if [ -z "${api_base_url}" ]; then
            api_base_url="$(extract_from_home_server_env "CUSTOM_PROD_BACKURL")"
          fi
          if [ -z "${api_base_url}" ]; then
            api_base_url="$(extract_from_home_server_env "custom.prod.backUrl")"
          fi
          if [ -z "${api_base_url}" ]; then
            api_base_url="$(extract_from_home_server_env "custom.site.backUrl")"
          fi
          if [ -z "${api_base_url}" ]; then
            api_domain_from_env="$(extract_from_home_server_env "API_DOMAIN")"
            if [ -n "${api_domain_from_env}" ]; then
              api_base_url="${base_scheme}://${api_domain_from_env}"
            fi
          fi
          if [ -z "${api_base_url}" ]; then
            resolved_front_host="$(echo "${base_url}" | sed -E 's#https?://([^/]+).*#\1#')"
            if [[ "${resolved_front_host}" == www.* ]]; then
              api_base_url="${base_scheme}://api.${resolved_front_host#www.}"
            else
              api_base_url="${base_scheme}://api.${resolved_front_host}"
            fi
          fi

          case "${api_base_url}" in
            http://*|https://*) ;;
            *)
              echo "Invalid E2E_API_BASE_URL: ${api_base_url}" >&2
              exit 1
              ;;
          esac
          echo "E2E_API_BASE_URL=${api_base_url}" >> "$GITHUB_ENV"
          echo "Resolved live e2e api base: ${api_base_url}"

          # 라이브 E2E 전용 계정을 우선 사용하고, 없으면 운영 관리자 계정으로 fallback 한다.
          resolved_admin_username="${E2E_LIVE_ADMIN_USERNAME:-}"
          resolved_admin_password="${E2E_LIVE_ADMIN_PASSWORD:-}"

          if [ -z "${resolved_admin_username}" ]; then
            resolved_admin_username="$(extract_admin_from_home_server_env "CUSTOM__E2E__ADMIN__USERNAME")"
          fi
          if [ -z "${resolved_admin_password}" ]; then
            resolved_admin_password="$(extract_admin_from_home_server_env "CUSTOM__E2E__ADMIN__PASSWORD")"
          fi

          if [ -z "${resolved_admin_username}" ]; then
            resolved_admin_username="$(extract_admin_from_home_server_env "CUSTOM__ADMIN__USERNAME")"
          fi
          if [ -z "${resolved_admin_password}" ]; then
            resolved_admin_password="$(extract_admin_from_home_server_env "CUSTOM__ADMIN__PASSWORD")"
          fi

          if [ -z "${resolved_admin_username}" ]; then
            resolved_admin_username="${E2E_ADMIN_USERNAME:-}"
          fi
          if [ -z "${resolved_admin_password}" ]; then
            resolved_admin_password="${E2E_ADMIN_PASSWORD:-}"
          fi

          if [ -n "${resolved_admin_username}" ]; then
            echo "E2E_ADMIN_USERNAME=${resolved_admin_username}" >> "$GITHUB_ENV"
          fi
          if [ -n "${resolved_admin_password}" ]; then
            echo "E2E_ADMIN_PASSWORD=${resolved_admin_password}" >> "$GITHUB_ENV"
          fi

      - name: Verify live e2e secrets
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${E2E_ADMIN_USERNAME}" ] || (echo "E2E_ADMIN_USERNAME is required" && exit 1)
          [ -n "${E2E_ADMIN_PASSWORD}" ] || (echo "E2E_ADMIN_PASSWORD is required" && exit 1)

      - name: Live e2e preflight checks (fail-fast)
        shell: bash
        run: |
          set -euo pipefail

          front_base="${PLAYWRIGHT_BASE_URL}"
          api_base="${E2E_API_BASE_URL:-}"
          api_host="$(echo "${api_base}" | sed -E 's#https?://([^/]+).*#\1#')"

          echo "preflight front=${front_base} api=${api_base}"

          PREFLIGHT_ATTEMPTS="${E2E_PREFLIGHT_ATTEMPTS:-5}"
          PREFLIGHT_CONNECT_TIMEOUT_SECONDS="${E2E_PREFLIGHT_CONNECT_TIMEOUT_SECONDS:-5}"
          PREFLIGHT_MAX_TIME_SECONDS="${E2E_PREFLIGHT_MAX_TIME_SECONDS:-15}"
          PREFLIGHT_SLEEP_SECONDS="${E2E_PREFLIGHT_SLEEP_SECONDS:-3}"
          PREFLIGHT_CURL_RETRY="${E2E_PREFLIGHT_CURL_RETRY:-2}"
          PREFLIGHT_FORCE_IPV4="${E2E_PREFLIGHT_FORCE_IPV4:-true}"

          curl_args=(
            -sS
            --connect-timeout "${PREFLIGHT_CONNECT_TIMEOUT_SECONDS}"
            -m "${PREFLIGHT_MAX_TIME_SECONDS}"
            --retry "${PREFLIGHT_CURL_RETRY}"
            --retry-all-errors
            --retry-delay 1
          )
          if [ "${PREFLIGHT_FORCE_IPV4}" = "true" ]; then
            curl_args+=(-4)
          fi

          probe_url() {
            local label="$1"
            local url="$2"
            local status_pattern="$3"
            local attempt="$4"
            local code
            code="$(
              curl "${curl_args[@]}" \
                -o /dev/null \
                -w '%{http_code}' \
                "${url}" || true
            )"
            echo "[preflight] ${label} attempt=${attempt} status=${code}"
            [[ "${code}" =~ ${status_pattern} ]]
          }

          probe_login() {
            local attempt="$1"
            local code
            code="$(
              curl "${curl_args[@]}" \
                -X POST \
                -H 'Content-Type: application/json' \
                -o /dev/null \
                -w '%{http_code}' \
                --data "{\"username\":\"${E2E_ADMIN_USERNAME}\",\"password\":\"${E2E_ADMIN_PASSWORD}\"}" \
                "${api_base}/member/api/v1/auth/login" || true
            )"
            echo "[preflight] api-login attempt=${attempt} status=${code}"
            [[ "${code}" =~ ^2[0-9][0-9]$ ]]
          }

          front_ok=0
          for attempt in $(seq 1 "${PREFLIGHT_ATTEMPTS}"); do
            if probe_url "front-login" "${front_base}/login" '^[1-4][0-9][0-9]$' "${attempt}"; then
              front_ok=1
              break
            fi
            sleep "${PREFLIGHT_SLEEP_SECONDS}"
          done
          if [ "${front_ok}" -ne 1 ]; then
            echo "preflight failed for front-login: ${front_base}/login" >&2
            exit 1
          fi

          api_ok=0
          for attempt in $(seq 1 "${PREFLIGHT_ATTEMPTS}"); do
            readiness_ok=0
            auth_ok=0

            if probe_url "api-readiness" "${api_base}/actuator/health/readiness" '^2[0-9][0-9]$' "${attempt}"; then
              readiness_ok=1
            fi
            if [ "${readiness_ok}" -ne 1 ]; then
              if probe_url "api-auth-me" "${api_base}/member/api/v1/auth/me" '^[1-4][0-9][0-9]$' "${attempt}"; then
                auth_ok=1
              fi
            fi
            if [ "${readiness_ok}" -ne 1 ] && [ "${auth_ok}" -ne 1 ]; then
              if probe_login "${attempt}"; then
                auth_ok=1
              fi
            fi

            if [ "${readiness_ok}" -eq 1 ] || [ "${auth_ok}" -eq 1 ]; then
              api_ok=1
              break
            fi

            sleep "$((PREFLIGHT_SLEEP_SECONDS * attempt))"
          done

          if [ "${api_ok}" -ne 1 ]; then
            echo "preflight failed for api routes: ${api_base}" >&2
            echo "[preflight-diagnostic] api dns lookup"
            getent hosts "${api_host}" || true
            echo "[preflight-diagnostic] curl headers /actuator/health/readiness"
            curl "${curl_args[@]}" -D - -o /dev/null "${api_base}/actuator/health/readiness" || true
            echo "[preflight-diagnostic] curl headers /member/api/v1/auth/me"
            curl "${curl_args[@]}" -D - -o /dev/null "${api_base}/member/api/v1/auth/me" || true
            echo "[preflight-diagnostic] curl headers /member/api/v1/auth/login"
            curl "${curl_args[@]}" -X POST -H 'Content-Type: application/json' -D - -o /dev/null --data "{\"username\":\"${E2E_ADMIN_USERNAME}\",\"password\":\"${E2E_ADMIN_PASSWORD}\"}" "${api_base}/member/api/v1/auth/login" || true
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: front/yarn.lock

      - name: Install dependencies
        working-directory: front
        run: yarn install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: front
        run: npx playwright install --with-deps chromium webkit

      - name: Run live production e2e
        working-directory: front
        env:
          PLAYWRIGHT_LIVE_FAIL_FAST: "true"
          PLAYWRIGHT_LIVE_MULTI_BROWSER: "true"
        shell: bash
        run: |
          set -euo pipefail

          heartbeat() {
            while true; do
              echo "[live-e2e] still running at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
              sleep 30
            done
          }

          heartbeat &
          hb_pid=$!
          cleanup() {
            kill "${hb_pid}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          npx playwright test e2e/live.spec.ts \
            --workers=1 \
            --reporter=line \
            --max-failures=1

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: front-live-e2e-playwright-report
          path: |
            front/playwright-report
            front/test-results
          retention-days: 7

  makeTagAndRelease:
    runs-on: ubuntu-latest
    needs:
      - calculateTag
      - blueGreenDeploy
      - frontLiveE2E
    permissions:
      contents: write

    steps:
      - name: Create deployment release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "${{ needs.calculateTag.outputs.release_tag }}";
            const imageRef = "${{ needs.calculateTag.outputs.image_ref }}";
            const deploySha = "${{ needs.calculateTag.outputs.deploy_sha }}";

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
            const retryableStatuses = new Set([429, 500, 502, 503, 504]);

            const withRetry = async (label, fn, options = {}) => {
              const attempts = options.attempts || 5;
              const baseDelayMs = options.baseDelayMs || 1200;
              let lastError;

              for (let attempt = 1; attempt <= attempts; attempt += 1) {
                try {
                  return await fn();
                } catch (error) {
                  lastError = error;
                  const status = error?.status;
                  const retryable = retryableStatuses.has(status);
                  if (!retryable || attempt === attempts) {
                    throw error;
                  }

                  const delayMs = baseDelayMs * attempt;
                  core.warning(`[release] ${label} failed(status=${status}) attempt=${attempt}/${attempts}, retry in ${delayMs}ms`);
                  await sleep(delayMs);
                }
              }

              throw lastError;
            };

            await withRetry("create tag ref", async () => {
              try {
                await github.rest.git.createRef({
                  owner,
                  repo,
                  ref: `refs/tags/${tag}`,
                  sha: deploySha
                });
              } catch (error) {
                if (error?.status !== 422) {
                  throw error;
                }

                const existingTagRef = await withRetry("read existing tag ref", () =>
                  github.rest.git.getRef({
                    owner,
                    repo,
                    ref: `tags/${tag}`
                  })
                );
                const existingSha = existingTagRef?.data?.object?.sha;

                if (existingSha !== deploySha) {
                  throw new Error(`[release] tag ${tag} already exists at different sha(existing=${existingSha}, expected=${deploySha})`);
                }

                core.info(`[release] tag ${tag} already exists and points to deploy sha`);
              }
            });

            const releaseName = `Deploy ${tag}`;
            const releaseBody = `Backend image: ${imageRef}\nWorkflow run: ${context.runId}`;

            try {
              await withRetry("create release", () =>
                github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: tag,
                  target_commitish: deploySha,
                  name: releaseName,
                  body: releaseBody,
                  generate_release_notes: true
                })
              );
              core.info(`[release] created tag=${tag}`);
            } catch (error) {
              if (error?.status !== 422) {
                throw error;
              }

              core.warning(`[release] release already exists for tag=${tag}, update metadata`);
              const existingRelease = await withRetry("get release by tag", () =>
                github.rest.repos.getReleaseByTag({
                  owner,
                  repo,
                  tag
                })
              );

              await withRetry("update existing release", () =>
                github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: existingRelease.data.id,
                  tag_name: tag,
                  target_commitish: deploySha,
                  name: releaseName,
                  body: releaseBody
                })
              );

              core.info(`[release] updated existing release id=${existingRelease.data.id}`);
            }
