name: CI

on:
  pull_request:
    branches:
      - main
  push:
    paths:
      - "back/**"
      - "front/**"
      - "deploy/**"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  contracts-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      OPENAPI_SOURCE_URL: ${{ vars.CI_OPENAPI_SOURCE_URL || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: front/yarn.lock
      - name: Install dependencies
        working-directory: front
        run: yarn install --frozen-lockfile
      - name: Fetch OpenAPI contract (strict when URL configured)
        if: env.OPENAPI_SOURCE_URL != ''
        working-directory: front
        run: yarn contracts:fetch
      - name: Verify contract drift
        working-directory: front
        run: yarn contracts:check

  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        with:
          filters: |
            backend:
              - 'back/**'
              - 'deploy/homeserver/**'
              - '.github/workflows/reusable-backend-quality.yml'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'front/**'
              - '.github/workflows/reusable-frontend-verify.yml'
              - '.github/workflows/ci.yml'

  backend-quality:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/reusable-backend-quality.yml
    secrets:
      CI_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      CI_REDIS_PASSWORD: ${{ secrets.CI_REDIS_PASSWORD }}

  front-verify:
    needs:
      - changes
      - backend-quality
    if: >
      always() &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true') &&
      (needs.changes.outputs.backend != 'true' || needs.backend-quality.result == 'success')
    uses: ./.github/workflows/reusable-frontend-verify.yml
    with:
      openapi_artifact_name: backend-openapi-contract
      openapi_artifact_required: ${{ needs.changes.outputs.backend == 'true' }}
      openapi_source_url: ${{ vars.CI_OPENAPI_SOURCE_URL || '' }}
      openapi_fetch_strict: true

  no-op:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend != 'true' && needs.changes.outputs.frontend != 'true'
    steps:
      - name: Skip
        run: echo "No backend/frontend changes detected."
