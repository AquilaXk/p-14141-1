name: CI

on:
  pull_request:
    branches:
      - main
  push:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    env:
      TEST_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      TEST_REDIS_PASSWORD: ${{ secrets.CI_REDIS_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "24"
          cache: gradle

      - name: Validate Flyway migration naming
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(back/src/main/resources/db/migration/*.sql)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No migration files found."
            exit 1
          fi

          invalid=0
          for file in "${files[@]}"; do
            base="$(basename "$file")"
            if [[ "$base" =~ ^V[0-9]{8}_[0-9]{2}__[a-z0-9_]+\.sql$ ]] || [[ "$base" =~ ^R__[a-z0-9_]+\.sql$ ]]; then
              continue
            fi
            echo "Invalid migration file name: $base"
            invalid=1
          done

          if [ $invalid -ne 0 ]; then
            echo "Migration naming rule violation detected."
            exit 1
          fi

      - name: Run backend ktlint
        working-directory: back
        run: ./gradlew ktlintCheck

      - name: Run backend tests
        working-directory: back
        run: ./gradlew test --rerun-tasks

  front-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: front/yarn.lock

      - name: Install dependencies
        working-directory: front
        run: yarn install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: front
        run: npx playwright install --with-deps chromium

      - name: Lint frontend
        working-directory: front
        run: yarn lint

      - name: Build frontend
        working-directory: front
        run: yarn build

      - name: Run smoke e2e
        working-directory: front
        run: yarn test:e2e:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: front-smoke-playwright-report
          path: |
            front/playwright-report
            front/test-results
          retention-days: 7
