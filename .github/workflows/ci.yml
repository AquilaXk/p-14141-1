name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "back/**"
      - "front/**"
      - "deploy/**"
      - ".github/workflows/**"
  push:
    paths:
      - "back/**"
      - "front/**"
      - "deploy/**"
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        with:
          filters: |
            backend:
              - 'back/**'
              - 'deploy/homeserver/**'
              - '.github/workflows/reusable-backend-quality.yml'
              - '.github/workflows/deploy.yml'
              - '.github/workflows/ci.yml'
            frontend:
              - 'front/**'
              - '.github/workflows/reusable-frontend-verify.yml'
              - '.github/workflows/ci.yml'

  backend-quality:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/reusable-backend-quality.yml
    secrets:
      CI_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      CI_REDIS_PASSWORD: ${{ secrets.CI_REDIS_PASSWORD }}

  front-verify:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/reusable-frontend-verify.yml

  no-op:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend != 'true' && needs.changes.outputs.frontend != 'true'
    steps:
      - name: Skip
        run: echo "No backend/frontend changes detected."
