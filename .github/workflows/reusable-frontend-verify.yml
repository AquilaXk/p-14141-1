name: Reusable Frontend Verify

on:
  workflow_call:

permissions:
  contents: read

jobs:
  front-verify:
    runs-on: ubuntu-latest
    env:
      BUNDLE_BUDGET_KB: "480"
      CLS_BUDGET: "0.12"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: front/yarn.lock

      - name: Install dependencies
        working-directory: front
        run: yarn install --frozen-lockfile

      - name: Lint frontend
        working-directory: front
        run: yarn lint

      - name: Build frontend
        working-directory: front
        run: yarn build

      - name: Check frontend bundle size budget
        working-directory: front
        run: yarn check:bundle-size

      - name: Install Playwright browser
        working-directory: front
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        working-directory: front
        run: yarn test:e2e:smoke

      - name: Run CLS perf e2e
        working-directory: front
        run: yarn test:e2e:perf

      - name: Upload frontend reports on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: front-verify-playwright-report
          path: |
            front/playwright-report
            front/test-results
          retention-days: 7
