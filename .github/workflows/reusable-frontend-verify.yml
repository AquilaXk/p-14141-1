name: Reusable Frontend Verify

on:
  workflow_call:
    inputs:
      openapi_artifact_name:
        description: "Backend OpenAPI artifact name (optional)"
        required: false
        type: string
        default: ""
      openapi_artifact_required:
        description: "Fail when backend OpenAPI artifact is required but missing"
        required: false
        type: boolean
        default: false
      openapi_source_url:
        description: "Live backend OpenAPI endpoint URL (optional)"
        required: false
        type: string
        default: ""
      openapi_fetch_strict:
        description: "Fail workflow when live OpenAPI fetch fails"
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  front-verify:
    runs-on: ubuntu-latest
    env:
      BUNDLE_BUDGET_MARGIN_PERCENT: "5"
      CLS_BUDGET: "0.12"
      OPENAPI_SOURCE_URL: ${{ inputs.openapi_source_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: front/yarn.lock

      - name: Install dependencies
        working-directory: front
        run: yarn install --frozen-lockfile

      - name: Lint frontend
        working-directory: front
        run: yarn lint

      - name: Build frontend
        working-directory: front
        run: yarn build

      - name: Download backend OpenAPI artifact
        if: inputs.openapi_artifact_name != ''
        id: download_openapi_artifact
        continue-on-error: true
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: ${{ inputs.openapi_artifact_name }}
          path: front/contracts/openapi-artifact

      - name: Apply backend OpenAPI artifact
        if: inputs.openapi_artifact_name != ''
        id: apply_openapi_artifact
        working-directory: front
        run: |
          set -euo pipefail
          source_path="contracts/openapi-artifact/openapi.json"
          target_path="contracts/openapi/openapi.json"

          if [ ! -f "$source_path" ]; then
            echo "applied=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cp "$source_path" "$target_path"
          echo "applied=true" >> "$GITHUB_OUTPUT"
          echo "Applied backend OpenAPI artifact to $target_path"

      - name: Validate required backend OpenAPI artifact
        if: inputs.openapi_artifact_required && steps.apply_openapi_artifact.outputs.applied != 'true'
        run: |
          echo "::error::Backend OpenAPI artifact is required but could not be applied."
          exit 1

      - name: Fetch live OpenAPI contract (strict)
        if: steps.apply_openapi_artifact.outputs.applied != 'true' && inputs.openapi_source_url != '' && inputs.openapi_fetch_strict
        working-directory: front
        run: yarn contracts:fetch

      - name: Fetch live OpenAPI contract (best-effort)
        id: openapi_fetch_optional
        if: steps.apply_openapi_artifact.outputs.applied != 'true' && inputs.openapi_source_url != '' && !inputs.openapi_fetch_strict
        continue-on-error: true
        working-directory: front
        run: yarn contracts:fetch

      - name: OpenAPI fetch fallback notice
        if: steps.openapi_fetch_optional.outcome == 'failure'
        run: echo "::warning::live OpenAPI fetch failed. Falling back to snapshot contracts/openapi/openapi.json"

      - name: Verify OpenAPI contract-generated types
        working-directory: front
        run: yarn contracts:check

      - name: Upload OpenAPI contract drift report
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-openapi-contract-report
          path: front/test-results/contracts-openapi
          if-no-files-found: warn
          retention-days: 7

      - name: Check frontend bundle size budget (warn on PR / strict on main-release)
        working-directory: front
        env:
          BUNDLE_BUDGET_ENFORCEMENT: ${{ github.event_name == 'pull_request' && 'warn' || ((startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/release')) && 'strict' || 'warn') }}
          BUNDLE_BUDGET_MARGIN_PERCENT: ${{ env.BUNDLE_BUDGET_MARGIN_PERCENT }}
          BUNDLE_REPORT_DIR: test-results/bundle-size
        run: yarn check:bundle-size

      - name: Upload bundle budget report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-bundle-budget-report
          path: front/test-results/bundle-size
          if-no-files-found: warn
          retention-days: 7

      - name: Check Storybook regression gate
        working-directory: front
        env:
          STORYBOOK_GATE_ENFORCEMENT: strict
          STORYBOOK_GATE_REPORT_DIR: test-results/storybook
        run: yarn storybook:gate

      - name: Upload Storybook gate report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-storybook-gate-report
          path: front/test-results/storybook
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Storybook static build
        if: success()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-storybook-static
          path: front/storybook-static
          if-no-files-found: warn
          retention-days: 7

      - name: Install Playwright browser
        working-directory: front
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        working-directory: front
        run: yarn test:e2e:smoke

      - name: Run editor authoring e2e
        working-directory: front
        run: yarn test:e2e:authoring

      - name: Run CLS perf e2e
        working-directory: front
        env:
          PLAYWRIGHT_JSON_REPORT_PATH: test-results/perf/playwright-perf.json
          PLAYWRIGHT_PERF_RUNTIME_METRICS_PATH: test-results/perf/runtime-guard-metrics.ndjson
        run: yarn test:e2e:perf

      - name: Summarize perf e2e report
        if: always()
        working-directory: front
        run: |
          node scripts/summarize-playwright-json.mjs \
            --input test-results/perf/playwright-perf.json \
            --output test-results/perf/perf-summary.md \
            --append-step-summary

      - name: Compare runtime guard metrics
        if: always()
        working-directory: front
        run: |
          node scripts/compare-runtime-guard-metrics.mjs \
            --metrics test-results/perf/runtime-guard-metrics.ndjson \
            --baseline ../deploy/homeserver/monitoring/grafana/dashboards/blog-runtime-guard-baseline.json \
            --output test-results/perf/runtime-guard-summary.md \
            --json-output test-results/perf/runtime-guard-summary.json \
            --append-step-summary

      - name: Run accessibility e2e
        working-directory: front
        run: yarn test:e2e:a11y

      - name: Upload perf e2e report
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-perf-e2e-report
          path: front/test-results/perf
          if-no-files-found: warn
          retention-days: 7

      - name: Upload frontend reports on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: front-verify-playwright-report
          path: |
            front/playwright-report
            front/test-results
          retention-days: 7
