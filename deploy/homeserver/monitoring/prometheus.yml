global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: back
    metrics_path: /actuator/prometheus
    scrape_interval: 15s
    static_configs:
      - targets:
          - back-blue:8080
          - back-read:8080
          - back-admin:8080
        labels:
          service: aquila-back

  - job_name: loki
    scrape_interval: 15s
    static_configs:
      - targets: ["loki:3100"]
        labels:
          service: aquila-loki

  - job_name: promtail
    scrape_interval: 15s
    static_configs:
      - targets: ["promtail:9080"]
        labels:
          service: aquila-promtail
