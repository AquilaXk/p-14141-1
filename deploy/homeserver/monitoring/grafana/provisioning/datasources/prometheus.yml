apiVersion: 1
prune: true

deleteDatasources:
  - name: Prometheus
    orgId: 1
  - name: prometheus
    orgId: 1
  - name: Loki
    orgId: 1
  - name: loki
    orgId: 1

datasources:
  - name: prometheus
    orgId: 1
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
  - name: loki
    orgId: 1
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
