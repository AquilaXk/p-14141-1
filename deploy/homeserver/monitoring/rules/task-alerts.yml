groups:
  - name: aquila-task-queue
    rules:
      - alert: AquilaTaskQueueBacklogHigh
        expr: task_queue_ready_pending > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Task ready backlog is high"
          description: "ready_pending={{ $value }} for 10m. Consider API/worker split or worker scale-up."

      - alert: AquilaTaskQueueStaleProcessing
        expr: task_queue_stale_processing >= 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Stale processing tasks detected"
          description: "stale_processing={{ $value }} for 5m. Check worker health and stuck handlers."

      - alert: AquilaApiLatencyP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(http_server_requests_seconds_bucket{uri!~"/actuator.*"}[5m]))) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency is high"
          description: "p95 > 1s for 10m. Check DB/Redis/task queue pressure."

      - alert: AquilaTaskDlqRateHigh
        expr: sum(rate(task_processor_result_total{status="dlq"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Task DLQ rate is above zero"
          description: "DLQ tasks are accumulating. Check failed handlers and replay policy."

      - alert: AquilaPostSearchIndexLagP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(post_search_index_task_lag_seconds_bucket[10m]))) > 120
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Search index async sync lag p95 is high"
          description: "post.search_index.task.lag p95 > 120s for 10m."
