groups:
  - name: aquila-task-queue
    rules:
      - alert: AquilaTaskQueueBacklogHigh
        expr: task_queue_ready_pending > 500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Task ready backlog is high"
          description: "ready_pending={{ $value }} for 10m. Consider API/worker split or worker scale-up."

      - alert: AquilaTaskQueueStaleProcessing
        expr: task_queue_stale_processing >= 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Stale processing tasks detected"
          description: "stale_processing={{ $value }} for 5m. Check worker health and stuck handlers."

      - alert: AquilaApiLatencyP95High
        expr: |
          (
            histogram_quantile(
              0.95,
              sum by (le) (
                rate(
                  {__name__=~"http_server_requests_seconds_bucket|http_server_request_duration_seconds_bucket",job="back",service="aquila-back",uri!~"/actuator.*"}[5m]
                )
              )
            )
            and on() (
              sum(
                rate(
                  {__name__=~"http_server_requests_seconds_count|http_server_request_duration_seconds_count",job="back",service="aquila-back",uri!~"/actuator.*"}[5m]
                )
              ) > bool 0.2
            )
          ) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "API p95 latency is high"
          description: "p95 > 1s for 10m. Check DB/Redis/task queue pressure."

      - alert: AquilaBackScrapeDown
        expr: min(up{job="back",service="aquila-back"}) < 1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Back metrics scrape is down"
          description: "Prometheus cannot scrape one or more back targets for 3m."

      - alert: AquilaTaskDlqRateHigh
        expr: sum(rate(task_processor_result_total{status="dlq"}[10m])) > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Task DLQ rate is above zero"
          description: "DLQ tasks are accumulating. Check failed handlers and replay policy."

      - alert: AquilaPostSearchIndexLagP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(post_search_index_task_lag_seconds_bucket[10m]))) > 120
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Search index async sync lag p95 is high"
          description: "post.search_index.task.lag p95 > 120s for 10m."

  - name: aquila-notification-sse
    rules:
      - alert: AquilaNotificationSseEmitterSaturated
        expr: max(member_notification_sse_global_emitters{job="back",service="aquila-back"}) > 1500
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Notification SSE emitter count is high"
          description: "global emitters > 1500 for 10m. Check reconnect storm, tab churn, or drain failures."

      - alert: AquilaNotificationSseReconnectSpike
        expr: sum(increase(member_notification_sse_reconnect_subscribe_total{job="back",service="aquila-back"}[10m])) > 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Notification SSE reconnect spike detected"
          description: "reconnect subscribe count increased sharply in the last 10m. Check QUIC/H3 instability, deploy cutover, or network churn."

      - alert: AquilaNotificationSseSendFailureSpike
        expr: sum(increase(member_notification_sse_send_failure_total{job="back",service="aquila-back"}[10m])) > 5
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Notification SSE send failures are increasing"
          description: "send failure count increased more than 5 in 10m. Check upstream disconnect storm, replay pressure, and transport stability."

  - name: aquila-monitoring-stack
    rules:
      - alert: AquilaLokiScrapeDown
        expr: min(up{job="loki",service="aquila-loki"}) < 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Loki metrics scrape is down"
          description: "Prometheus cannot scrape Loki for 3m. Check loki container and network."

      - alert: AquilaPromtailScrapeDown
        expr: min(up{job="promtail",service="aquila-promtail"}) < 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Promtail metrics scrape is down"
          description: "Prometheus cannot scrape Promtail for 3m. Check promtail container and docker log mount."
