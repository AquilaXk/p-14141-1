name: blog_home

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - caddy

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - ./.env.prod

  back_blue:
    build:
      context: ../../back
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      DEPLOY_COLOR: blue
    depends_on:
      - db_1
      - redis_1

  back_green:
    build:
      context: ../../back
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      DEPLOY_COLOR: green
    depends_on:
      - db_1
      - redis_1

  db_1:
    image: jangka512/pgj:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PROD___SPRING__DATASOURCE__PASSWORD}
      POSTGRES_DATABASE: postgres
      POSTGRES_DATABASES: ${DB_BASE_NAME:-blog}_prod
      TZ: Asia/Seoul
    volumes:
      - db_data:/var/lib/postgresql

  redis_1:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${PROD___SPRING__DATA__REDIS__PASSWORD}

volumes:
  db_data:
  caddy_data:
  caddy_config:
