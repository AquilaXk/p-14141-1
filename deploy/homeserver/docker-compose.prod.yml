name: blog_home

services:
  autoheal:
    image: willfarrell/autoheal:1.2.0
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: ${AUTOHEAL_INTERVAL_SECONDS:-15}
      AUTOHEAL_START_PERIOD: ${AUTOHEAL_START_PERIOD_SECONDS:-300}
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  cloudflared:
    image: ${CLOUDFLARED_IMAGE}
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - caddy

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - ./.env.prod

  uptime_kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data

  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    depends_on:
      - back_blue
      - back_green
      - back_worker

  grafana:
    image: grafana/grafana:11.2.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_grafana_password}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: "X-WEBAUTH-USER"
      GF_AUTH_PROXY_HEADER_PROPERTY: "username"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      GF_AUTH_PROXY_ENABLE_LOGIN_TOKEN: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_COOKIE_SAMESITE: "none"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: "Viewer"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.localhost}
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command:
      - "-config.file=/etc/loki/loki-config.yml"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command:
      - "-config.file=/etc/promtail/promtail-config.yml"
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/var/lib/promtail
    depends_on:
      - loki

  back_blue:
    image: ${BACK_IMAGE:?BACK_IMAGE is required (sha-pinned; latest forbidden)}
    restart: unless-stopped
    mem_limit: ${BACK_MEM_LIMIT:-512m}
    mem_reservation: ${BACK_MEM_RESERVATION:-256m}
    labels:
      autoheal: "${BACK_AUTOHEAL_ENABLED:-true}"
    healthcheck:
      # Restart 판단은 liveness 기준으로만 수행한다.
      # readiness(db 포함)는 트래픽 수용 판단용이며, autoheal 재기동 신호로 쓰면 재시작 루프가 발생할 수 있다.
      test: ["CMD-SHELL", "wget -q -T 3 -O /dev/null http://127.0.0.1:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      CUSTOM__RUNTIME__WORKER_ENABLED: "false"
      CUSTOM__RUNTIME__API_MODE: ${CUSTOM__RUNTIME__API_MODE_BLUE:-${CUSTOM__RUNTIME__API_MODE:-all}}
      DEPLOY_COLOR: blue
    depends_on:
      - db_1
      - redis_1
      - minio_1
    networks:
      default:
        aliases:
          - back-blue

  back_green:
    image: ${BACK_IMAGE:?BACK_IMAGE is required (sha-pinned; latest forbidden)}
    restart: unless-stopped
    mem_limit: ${BACK_MEM_LIMIT:-512m}
    mem_reservation: ${BACK_MEM_RESERVATION:-256m}
    labels:
      autoheal: "${BACK_AUTOHEAL_ENABLED:-true}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O /dev/null http://127.0.0.1:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      CUSTOM__RUNTIME__WORKER_ENABLED: "false"
      CUSTOM__RUNTIME__API_MODE: ${CUSTOM__RUNTIME__API_MODE_GREEN:-${CUSTOM__RUNTIME__API_MODE:-all}}
      DEPLOY_COLOR: green
    depends_on:
      - db_1
      - redis_1
      - minio_1
    networks:
      default:
        aliases:
          - back-green

  back_read:
    profiles: ["runtime-split"]
    image: ${BACK_IMAGE:?BACK_IMAGE is required (sha-pinned; latest forbidden)}
    restart: unless-stopped
    mem_limit: ${BACK_READ_MEM_LIMIT:-640m}
    mem_reservation: ${BACK_READ_MEM_RESERVATION:-320m}
    labels:
      autoheal: "${BACK_AUTOHEAL_ENABLED:-true}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O /dev/null http://127.0.0.1:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      CUSTOM__RUNTIME__WORKER_ENABLED: "false"
      CUSTOM__RUNTIME__API_MODE: read
      DEPLOY_COLOR: read
    depends_on:
      - db_1
      - redis_1
      - minio_1
    networks:
      default:
        aliases:
          - back-read

  back_admin:
    profiles: ["runtime-split"]
    image: ${BACK_IMAGE:?BACK_IMAGE is required (sha-pinned; latest forbidden)}
    restart: unless-stopped
    mem_limit: ${BACK_ADMIN_MEM_LIMIT:-512m}
    mem_reservation: ${BACK_ADMIN_MEM_RESERVATION:-256m}
    labels:
      autoheal: "${BACK_AUTOHEAL_ENABLED:-true}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O /dev/null http://127.0.0.1:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      CUSTOM__RUNTIME__WORKER_ENABLED: "false"
      CUSTOM__RUNTIME__API_MODE: admin
      DEPLOY_COLOR: admin
    depends_on:
      - db_1
      - redis_1
      - minio_1
    networks:
      default:
        aliases:
          - back-admin

  back_worker:
    image: ${BACK_IMAGE:?BACK_IMAGE is required (sha-pinned; latest forbidden)}
    restart: unless-stopped
    mem_limit: ${BACK_WORKER_MEM_LIMIT:-768m}
    mem_reservation: ${BACK_WORKER_MEM_RESERVATION:-768m}
    labels:
      autoheal: "${BACK_AUTOHEAL_ENABLED:-true}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O /dev/null http://127.0.0.1:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      CUSTOM__RUNTIME__WORKER_ENABLED: "true"
      CUSTOM__RUNTIME__API_MODE: ${CUSTOM__RUNTIME__API_MODE_WORKER:-${CUSTOM__RUNTIME__API_MODE:-all}}
      DEPLOY_COLOR: worker
    depends_on:
      - db_1
      - redis_1
      - minio_1

  db_1:
    image: ${DB_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PROD___SPRING__DATASOURCE__PASSWORD}
      POSTGRES_DATABASE: postgres
      POSTGRES_DATABASES: ${DB_BASE_NAME:-blog}_prod
      TZ: Asia/Seoul
    volumes:
      - db_data:/var/lib/postgresql

  redis_1:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${PROD___SPRING__DATA__REDIS__PASSWORD}

  minio_1:
    image: ${MINIO_IMAGE}
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Seoul
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      default:
        aliases:
          - minio

volumes:
  db_data:
  caddy_data:
  caddy_config:
  minio_data:
  uptime_kuma_data:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
