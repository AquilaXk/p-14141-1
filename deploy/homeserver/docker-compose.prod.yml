name: blog_home

services:
  autoheal:
    image: willfarrell/autoheal:1.2.0
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: ${AUTOHEAL_INTERVAL_SECONDS:-15}
      AUTOHEAL_START_PERIOD: ${AUTOHEAL_START_PERIOD_SECONDS:-300}
      AUTOHEAL_DEFAULT_STOP_TIMEOUT: 30
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  cloudflared:
    image: ${CLOUDFLARED_IMAGE}
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    depends_on:
      - caddy

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    command: caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy:/etc/caddy:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - ./.env.prod

  uptime_kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data

  back_blue:
    image: ${BACK_IMAGE:-ghcr.io/aquilaxk/aquila-blog-back:latest}
    restart: unless-stopped
    mem_limit: ${BACK_MEM_LIMIT:-512m}
    mem_reservation: ${BACK_MEM_RESERVATION:-256m}
    labels:
      autoheal: "${BACK_AUTOHEAL_ENABLED:-true}"
    healthcheck:
      # Restart 판단은 liveness 기준으로만 수행한다.
      # readiness(db 포함)는 트래픽 수용 판단용이며, autoheal 재기동 신호로 쓰면 재시작 루프가 발생할 수 있다.
      test: ["CMD-SHELL", "wget -q -T 3 -O /dev/null http://127.0.0.1:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      CUSTOM__RUNTIME__WORKER_ENABLED: "false"
      CUSTOM__RUNTIME__API_MODE: ${CUSTOM__RUNTIME__API_MODE_BLUE:-${CUSTOM__RUNTIME__API_MODE:-all}}
      DEPLOY_COLOR: blue
    depends_on:
      - db_1
      - redis_1
      - minio_1
    networks:
      default:
        aliases:
          - back-blue

  back_green:
    image: ${BACK_IMAGE:-ghcr.io/aquilaxk/aquila-blog-back:latest}
    restart: unless-stopped
    mem_limit: ${BACK_MEM_LIMIT:-512m}
    mem_reservation: ${BACK_MEM_RESERVATION:-256m}
    labels:
      autoheal: "${BACK_AUTOHEAL_ENABLED:-true}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O /dev/null http://127.0.0.1:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      CUSTOM__RUNTIME__WORKER_ENABLED: "false"
      CUSTOM__RUNTIME__API_MODE: ${CUSTOM__RUNTIME__API_MODE_GREEN:-${CUSTOM__RUNTIME__API_MODE:-all}}
      DEPLOY_COLOR: green
    depends_on:
      - db_1
      - redis_1
      - minio_1
    networks:
      default:
        aliases:
          - back-green

  back_read:
    profiles: ["runtime-split"]
    image: ${BACK_IMAGE:-ghcr.io/aquilaxk/aquila-blog-back:latest}
    restart: unless-stopped
    mem_limit: ${BACK_READ_MEM_LIMIT:-640m}
    mem_reservation: ${BACK_READ_MEM_RESERVATION:-320m}
    labels:
      autoheal: "${BACK_AUTOHEAL_ENABLED:-true}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O /dev/null http://127.0.0.1:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      CUSTOM__RUNTIME__WORKER_ENABLED: "false"
      CUSTOM__RUNTIME__API_MODE: read
      DEPLOY_COLOR: read
    depends_on:
      - db_1
      - redis_1
      - minio_1
    networks:
      default:
        aliases:
          - back-read

  back_admin:
    profiles: ["runtime-split"]
    image: ${BACK_IMAGE:-ghcr.io/aquilaxk/aquila-blog-back:latest}
    restart: unless-stopped
    mem_limit: ${BACK_ADMIN_MEM_LIMIT:-384m}
    mem_reservation: ${BACK_ADMIN_MEM_RESERVATION:-192m}
    labels:
      autoheal: "${BACK_AUTOHEAL_ENABLED:-true}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 3 -O /dev/null http://127.0.0.1:8080/actuator/health/liveness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      CUSTOM__RUNTIME__WORKER_ENABLED: "false"
      CUSTOM__RUNTIME__API_MODE: admin
      DEPLOY_COLOR: admin
    depends_on:
      - db_1
      - redis_1
      - minio_1
    networks:
      default:
        aliases:
          - back-admin

  back_worker:
    image: ${BACK_IMAGE:-ghcr.io/aquilaxk/aquila-blog-back:latest}
    restart: unless-stopped
    mem_limit: ${BACK_WORKER_MEM_LIMIT:-768m}
    mem_reservation: ${BACK_WORKER_MEM_RESERVATION:-768m}
    env_file:
      - ./.env.prod
    environment:
      SPRING_PROFILES_ACTIVE: prod
      CUSTOM_PROD_DBHOST: db_1
      CUSTOM_PROD_REDISHOST: redis_1
      CUSTOM__RUNTIME__WORKER_ENABLED: "true"
      CUSTOM__RUNTIME__API_MODE: ${CUSTOM__RUNTIME__API_MODE_WORKER:-${CUSTOM__RUNTIME__API_MODE:-all}}
      DEPLOY_COLOR: worker
    depends_on:
      - db_1
      - redis_1
      - minio_1

  db_1:
    image: ${DB_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PROD___SPRING__DATASOURCE__PASSWORD}
      POSTGRES_DATABASE: postgres
      POSTGRES_DATABASES: ${DB_BASE_NAME:-blog}_prod
      TZ: Asia/Seoul
    volumes:
      - db_data:/var/lib/postgresql

  redis_1:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${PROD___SPRING__DATA__REDIS__PASSWORD}

  minio_1:
    image: ${MINIO_IMAGE}
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Seoul
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      default:
        aliases:
          - minio

volumes:
  db_data:
  caddy_data:
  caddy_config:
  minio_data:
  uptime_kuma_data:
